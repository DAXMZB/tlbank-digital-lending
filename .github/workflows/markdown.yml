# ==========================================
# Markdown Check
# 用途：檢查 production Markdown（與 npm run lint:md 同範圍）
# ==========================================

name: Markdown Check

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      # 只有 Markdown 文件變更才觸發
      - "**/*.md"
      # workflow 變更也觸發
      - ".github/workflows/markdown.yml"
      # markdownlint 設定檔變更也觸發
      - ".markdownlint-cli2.jsonc"
      - ".markdownlintignore"
      - "package.json"
      - "package-lock.json"

  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "**/*.md"
      - ".github/workflows/markdown.yml"
      - ".markdownlint-cli2.jsonc"
      - ".markdownlintignore"
      - "package.json"
      - "package-lock.json"

jobs:
  markdown-check:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      # 下載 GitHub Repository 原始碼
      - name: Checkout source code
        uses: actions/checkout@v5

      # 執行 markdownlint-cli2
      # 範圍與 package.json "lint:md" / .markdownlintignore 一致
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            sp2-springboot/README.md
            sp2-springboot/docs/README.md
            sp2-springboot/docs/design/**/*.md
            sp2-springboot/docs/decisions/**/*.md
            sp2-springboot/docs/onboarding/**/*.md
            sp2-springboot/docs/diagrams/**/*.md
            sp2-springboot/docs/handbook/00-*.md
            sp2-springboot/docs/handbook/01-*.md
            sp2-springboot/docs/handbook/02-*.md
            sp2-springboot/docs/handbook/03-*.md
            sp2-springboot/docs/handbook/04-*.md
            sp2-springboot/docs/handbook/05-*.md
            sp2-springboot/docs/handbook/06-*.md
            sp2-springboot/docs/handbook/07-*.md
            sp2-springboot/docs/handbook/08-*.md
            sp2-springboot/docs/handbook/12-*.md
            sp2-springboot/docs/open-book/**/*.md
            infra/local/README.md
