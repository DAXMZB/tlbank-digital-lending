# ==========================================================================
# 🏦 TLBank CI/CD — 多專案根目錄自動化完整工作流程 (自託管手動觸發版)
# 功能：原始碼檢出 ➔ Maven 編譯測試 ➔ 程式碼品質檢查 ➔ 資安漏洞掃描 ➔ 鏡像封裝 ➔ 手動本機部署
# 適用環境：本機 Mac (Docker Desktop + SQL Server 2022 容器架構) + Self-hosted Runner
# ==========================================================================
name: TLBank CI/CD

# --------------------------------------------------------------------------
# 🎯 自動化觸發條件設定 (Triggers)
# --------------------------------------------------------------------------
on:
  push:
    branches: [ "main", "develop" ]  # 當程式碼 Push（推送）到 main 或 develop 分支時觸發流程
    paths:
      - "sp2-springboot/**"          # 限制只有當後端子專案資料夾內的檔案有變動時，才執行此 CI/CD
      - ".github/workflows/ci.yml"   # 如果本自動化設定檔本身被修改，也同步觸發執行
  pull_request:
    branches: [ "main", "develop" ]  # 對 main 或 develop 分支發起合併請求（PR）時觸發
    paths:
      - "sp2-springboot/**"          # 限制只有 PR 內容涉及後端專案時才進行品質審查
      - ".github/workflows/ci.yml"
  workflow_dispatch:                 # 🖐️ 手動觸發開關：在 GitHub 網頁上生成「Run workflow」按鈕。
                                      # 讓 Staging 部署完全由你自己手動決定時機，平時 Push 絕不驚動本機。

# --------------------------------------------------------------------------
# 🔒 執行身份存取權限控管 (Permissions)
# --------------------------------------------------------------------------
permissions:
  contents: read                     # 允許 GitHub Actions 安全讀取本專案的原始碼內容
  packages: write                    # 允許 GitHub Actions 寫入與上傳 Docker 映像檔到 GitHub 套件庫 (GHCR)

# --------------------------------------------------------------------------
# 🌐 全域環境變數定義 (Global Environment Variables)
# --------------------------------------------------------------------------
env:
  APP_DIR: sp2-springboot            # 單一真相來源：宣告後端主專案的資料夾名稱，方便後續所有任務統一引用

jobs:

  # ==========================================================================
  # 🧪 任務一：Maven 編譯與單元測試 (Build and Test) — 跑在 GitHub 雲端
  # ==========================================================================
  build-test:
    name: Build and Test             # 在 GitHub 儀表板上顯示的任務區塊名稱
    runs-on: ubuntu-latest            # 配置 GitHub 雲端標準的 Linux (Ubuntu) 虛擬機作為運行環境

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 步驟 1：檢出並下載本專案的最新原始碼到虛擬機中

      - name: Set up Java 17
        uses: actions/setup-java@v5    # 步驟 2：快速配置 Java 17 JDK 編譯環境
        with:
          distribution: temurin      # 採用 Eclipse Temurin 發行版
          java-version: 17           # 嚴格指定使用 Java 17 版本進行構建
          cache: maven                # 效能優化：開啟內建的 Maven 快取，job 結束時自動保存，下次執行自動還原
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml # 以子目錄下的 pom.xml 作為快取是否過期的核對密鑰

      - name: Build and test with Maven
        working-directory: ${{ env.APP_DIR }} # 切換工作路徑至後端子專案資料夾下
        run: mvn clean verify         # 執行清理、編譯、單元測試與整合測試，確保程式碼邏輯無誤

  # ==========================================================================
  # 🔍 任務二：程式碼品質與靜態檢查 (Code Quality) — 跑在 GitHub 雲端
  # ==========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-test                 # 嚴格防線：必須等待「任務一：編譯與測試」成功通過後，才放行此任務

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      - name: Set up Java 17
        uses: actions/setup-java@v5    # 載入 Java 17環境
        with:
          distribution: temurin
          java-version: 17
          cache: maven                # 繼續共享並復用上一步保存的 Maven 快取，省去重跑下載的時間
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml

      - name: Run Maven verification
        working-directory: ${{ env.APP_DIR }}
        run: mvn verify               # 執行靜態代碼驗證，用以觸發專案內部設定的代碼 Style 檢查插件

  # ==========================================================================
  # 🛡️ 任務三：第三方套件安全漏洞掃描 (Dependency Scan) — 跑在 GitHub 雲端
  # ==========================================================================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待「任務一：編譯與測試」成功通過後，才執行

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      # 💡 先配置 Java；setup-java 內建的 cache 會在此步驟自動將本地依賴還原至虛擬機的 ~/.m2
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven                # 確保在進行資安分析前，~/.m2 目錄就已經成功的還原完成
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml

      # 💡 流量防護：預先在本地將專案相依套件全數解析完畢，阻斷 Trivy 觸發遠端中央倉庫 429 限流問題
      - name: Resolve Maven dependencies
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B -q dependency:resolve # 以批次、安靜模式下載解析套件至虛擬機本地

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0 # 鎖定穩定版資安套件，防止追蹤 master 分支時因上游改版導致 CI 故障
        with:
          scan-type: fs               # 指定掃描類型為：檔案系統本體掃描 (Filesystem)
          scan-ref: ${{ env.APP_DIR }} # 精確指定只掃描後端子專案目錄，剔除其餘雜訊
          severity: HIGH,CRITICAL     # 風險控管：唯有發現「高風險」與「災難級嚴重」的漏洞才會呈報
          ignore-unfixed: true        # 過濾雜訊：忽略目前全球官方尚未釋出修復補丁的漏洞，專注在可修復的依賴上
          format: table               # 格式化輸出：以清晰的表格形式將漏洞報告呈現在 GitHub 日誌中
          exit-code: 0                # 報告模式：純產出漏洞報告，不因為發現舊漏洞而強行掐斷或卡死後續的流程

  # ==========================================================================
  # 🐳 任務四：Docker 映像檔封裝與上傳 (Build and Push Image) — 跑在 GitHub 雲端
  # ==========================================================================
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # 鋼鐵防禦鏈：必須前面三個 CI 任務（測試、品質、資安）全數通過，才放行進入封裝生產線
    needs: [build-test, code-quality, dependency-scan]

    # 🟢 門禁控管：若是正常的程式碼 Push，必須是在 main 分支才執行打包；
    # 若是在網頁上手動點擊 workflow_dispatch，也放行進行封裝，確保部署時拿得到最新映像檔
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      # 💡 GHCR 路徑規範：GitHub 映像檔倉庫要求路徑必須「全小寫」。透過 Linux 的 tr 指令將大寫帳號轉為全小寫
      - name: Set lowercase GHCR image name
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER}/tlbank-backend" >> "$GITHUB_ENV" # 寫入環境變數供後續步驟引用

      - name: Login to GHCR
        uses: docker/login-action@v3   # 登入到 GitHub Container Registry 映像檔倉庫
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # 自動獲取當前觸發流程的 GitHub 帳號名稱
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 Actions 內建短暫產生的權杖安全登入

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # 呼叫官方進階 Docker 打包套件
        with:
          context: ${{ env.APP_DIR }} # 宣告 Docker 構建的上下文起點為後端專案目錄
          file: ${{ env.APP_DIR }}/docker/app/Dockerfile # 讀取子專案目錄底下的 Dockerfile 封裝食譜
          push: true                  # 打包成功後，立刻推送到 GitHub 雲端映像檔倉庫上
          tags: |                     # 同時為這枚映像檔貼上兩種識別標籤：
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ==========================================================================
  # 🚀 任務五：本機 Mac 手動部署 (Deploy to Staging Server) —— 僅限手動觸發
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, macos]      # 跑在本機 Mac 的自託管執行器上
    needs: build-and-push-image

    # 🔒 唯一允許執行條件：只有在 GitHub Actions 網頁上手動點擊「Run workflow」時才會啟動
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Set lowercase GHCR image name
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER}/tlbank-backend" >> "$GITHUB_ENV"

      # 🛠️ 步驟 1：直接在 Mac 本機硬碟中動態建立或更新 docker-compose.yml 檔案
      - name: Write docker-compose.yml on local Mac
        run: |
          set -e                       # 防禦語法：只要有任何一條指令出錯，立刻中斷
          mkdir -p ~/tlbank              # 在 Mac 家目錄下建立專屬維運資料夾
          cd ~/tlbank                  # 切換進該資料夾內

          cat > docker-compose.yml << 'INNER_EOF'
          services:
            sqlserver:
              image: mcr.microsoft.com/mssql/server:2022-latest
              container_name: tlbank-sqlserver
              environment:
                ACCEPT_EULA: "Y"                           # 同意微軟官方授權條款 (End User License Agreement)
                MSSQL_SA_PASSWORD: "${{ secrets.MSSQL_SA_PASSWORD }}" # 帶入本機真實密碼 (ChangeMe@SA2024)
                MSSQL_PID: Developer                       # 設定 SQL Server 產品識別碼為免費的開發者版本 (Developer)
              ports:
                - "1433:1433"                              # 將容器的 1433 埠對外映射到 Mac 本地的 1433 埠
              volumes:
                - sqlserver-data:/var/opt/mssql            # 將資料庫實體檔案持久化掛載至 Mac 本地磁碟
              networks:
                - tlbank-network                            # 加入內部專屬虛擬網路，確保容器間可以互相通訊
              healthcheck:                                 # 資料庫健康檢查機制
                test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${{ secrets.MSSQL_SA_PASSWORD }}" -C -Q "SELECT 1" || exit 1
                interval: 15s                              # 每隔 15 秒檢測一次健康狀態
                timeout: 10s                               # 每次檢測連線超時上限為 10 秒
                retries: 12                                # 允許連續失敗的最大重試次數為 12 次
                start_period: 300s                          # 容器啟動後的前 300 秒為緩衝期，不計入失敗次數

            db-init:
              image: mcr.microsoft.com/mssql/server:2022-latest # 復用微軟官方映像檔作為指令執行工具
              container_name: tlbank-db-init
              depends_on:
                sqlserver:
                  condition: service_healthy              # 嚴格要求：必須等待 sqlserver 容器健康檢查完全通過後才啟動
              environment:
                MSSQL_SA_PASSWORD: "${{ secrets.MSSQL_SA_PASSWORD }}"
              networks:
                - tlbank-network
              entrypoint: ["/bin/bash", "-c"]             # 覆寫預設進入點，指定使用 bash 終端機執行初始化
              command:                                     # 自動化 SQL 語法：若 tlbank 資料庫不存在則自動建立
                - >
                  /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${{ secrets.MSSQL_SA_PASSWORD }}" -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'tlbank') CREATE DATABASE tlbank;"
              restart: "no"                                # 任務完成即關閉，不需要反覆重啟容器

            redis:
              image: redis:7.4-alpine                         # 使用固定版本的輕量 Redis 映像，避免 latest 造成版本漂移
              container_name: tlbank-redis
              command: ["redis-server", "--appendonly", "yes"] # 開啟 AOF，讓資料可寫入持久化磁碟卷
              ports:
                - "6379:6379"                                # 將 Redis 6379 埠映射至 Mac 本機，方便本機檢查
              volumes:
                - redis-data:/data                           # 保存 Redis 資料，容器重建後仍可保留
              networks:
                - tlbank-network
              healthcheck:                                   # 使用 redis-cli PING 確認服務可正常回應
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 10
                start_period: 10s
              restart: unless-stopped                        # 非手動停止時，自動重新啟動服務

            app:
              image: ${{ env.IMAGE_NAME }}:latest         # 抓取剛才封裝好並上傳到 GHCR 的最新後端映像檔
              container_name: tlbank-app
              depends_on:
                sqlserver:
                  condition: service_healthy              # 基礎依賴：確保資料庫已經處於健康可連線狀態
                db-init:
                  condition: service_completed_successfully # 基礎依賴：確保資料庫 tlbank 已經成功被初始化建立
                redis:
                  condition: service_healthy                # 快取依賴：Redis 健康後才啟動 Spring Boot 應用
              ports:
                - "8080:8080"                              # 將後端 Java 應用的 8080 埠對外映射到 Mac 的 8080 埠
              environment:                                 # 注入 Spring Boot 執行環境變數
                SPRING_PROFILES_ACTIVE: staging            # 啟用 staging 環境設定（對應 application-staging.yml）
                SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=tlbank;encrypt=false; # 資料庫連線字串
                SPRING_DATASOURCE_USERNAME: sa             # 資料庫登入帳號
                SPRING_DATASOURCE_PASSWORD: "${{ secrets.MSSQL_SA_PASSWORD }}" # 資料庫登入密碼
                SERVER_SERVLET_SESSION_TIMEOUT: 30m        # 設定使用者登入 Session 逾時時間為 30 分鐘
                APP_UPLOAD_PATH: /app/uploads      # 指定檔案上傳在本機容器內的實體根路徑
                SPRING_DATA_REDIS_HOST: redis                # 使用 Compose 服務名稱連線 Redis，不使用 localhost
                SPRING_DATA_REDIS_PORT: 6379                 # Redis 容器內部服務埠
              volumes:
                - app-uploads:/app/uploads                 # 掛載持久化硬碟空間，避免上傳的圖片因容器重啟而消失
                - app-logs:/app/logs                       # 掛載日誌檔案路徑，將 Spring Boot Log 導出至 Mac 本地方便排查
              networks:
                - tlbank-network
              # 🐳 調整點 1 & 2：優化內置健康檢查參數，應對高負載 CI 環境
              # 將暖機緩衝期 (start_period) 延長至 300 秒，重試次數拉長至 40 次，給予 Spring Boot、資料庫及 Redis 完整的建置和連線池初始化時間
              healthcheck:
                test: 
                  [
                    "CMD-SHELL",
                    "curl -f http://localhost:8080/actuator/health || exit 1"
                  ]
                interval: 15s
                timeout: 10s
                retries: 40
                start_period: 300s
              restart: unless-stopped                        # 發生異常退出時自動重新啟動應用程式

          volumes:
            sqlserver-data:                                # 定義 SQL Server 資料持久化磁碟卷
            app-uploads:                                   # 定義應用程式檔案上傳持久化磁碟卷
            app-logs:                                      # 定義應用程式日誌持久化磁碟卷
            redis-data:                                     # 定義 Redis AOF 資料持久化磁碟卷

          networks:
            tlbank-network:
              driver: bridge                               # 採用橋接模式 (Bridge) 建立容器間的內部隔離虛擬網路
          INNER_EOF

      # 🎯 步驟 2：隔離 macOS 鑰匙圈！在本機直接執行安全部署
      - name: Pull and restart containers locally
        working-directory: /Users/lidong/tlbank
        env:
          # 💡 核心防禦：強迫 Docker 使用 Actions 虛擬機提供的臨時空目錄作為 config 儲存點
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
          # 📌 架構對齊：明確固定 project 名稱，避免因目錄別名造成的不確定性
          COMPOSE_PROJECT_NAME: tlbank
        run: |
          set -e

          # 建立乾淨臨時 Docker 設定資料夾，阻絕舊快取與實體系統鑰匙圈干擾
          mkdir -p "$DOCKER_CONFIG"

          # 關鍵補丁：把原本 Docker Desktop 裝好的 cli-plugins（含 docker-compose）
          # 複製進隔離用的臨時 config 目錄，避免 DOCKER_CONFIG 覆寫後找不到 compose 外掛
          if [ -d "$HOME/.docker/cli-plugins" ]; then
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            cp -a "$HOME/.docker/cli-plugins/." "$DOCKER_CONFIG/cli-plugins/"
          fi

          # 驗證 compose 外掛是否真的能被找到（方便排查，可事後拿掉）
          docker compose version

          # 🔐 核心防禦：直接把帳密寫成 base64 塞進 auths，完全跳過 docker login 與 keychain 機制
          # 透過將「使用者名稱:Token」進行 Base64 編碼，生成符合 Docker 規範的憑證字串並過濾換行符號
          AUTH=$(printf '%s:%s' "${{ secrets.GHCR_USERNAME }}" "${{ secrets.GHCR_TOKEN }}" | base64 | tr -d '\n')

          # 🔒 關鍵修正：硬性覆寫設定檔，直接將驗證金鑰寫入臨時設定，徹底阻斷 Docker 調用 macOS 的鑰匙圈機制
          cat > "$DOCKER_CONFIG/config.json" << EOF
          {
            "auths": {
              "ghcr.io": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

          # 🗑️ 環境清理：先清掉「tlbank Groot」這個 compose 專案的殘留容器，確保部署環境乾淨
          docker compose down --remove-orphans 2>/dev/null || true

          # 🧹 保險：不管容器屬於哪個 compose 專案，只要名字撞到就強制移除，
          # 避免其他手動啟動的 Compose 專案佔用同名容器
          for c in tlbank-sqlserver tlbank-db-init tlbank-redis tlbank-app; do
            docker rm -f "$c" >/dev/null 2>&1 || true
          done

          # 📥 拉取 Compose 內所有服務需要的最新映像檔
          # app 會從 GHCR 拉取，SQL Server 與 Redis 則從各自的公開映像倉庫拉取
          docker compose pull

          # 🚀 依照健康檢查與相依順序，在背景啟動全部服務
          docker compose up -d --remove-orphans

          # 📋 顯示目前服務狀態，方便從 GitHub Actions 日誌確認容器是否成功建立
          docker compose ps

          # 🩺 調整點 3：提升手動部署腳本的等待耐受度
          # 改為最多嘗試 60 次 (每次間隔 10 秒，總計 10 分鐘上限)，並加上 2>/dev/null 遮蔽網路噪訊，防止 Connection Reset 階段直接中斷腳本
          APP_READY=false
          for attempt in $(seq 1 60); do
            if curl -fsS "http://localhost:8080/actuator/health" 2>/dev/null | grep -q '"status":"UP"'; then
              APP_READY=true
              echo "Spring Boot application is healthy on attempt ${attempt}."
              break
            fi

            echo "Waiting for application health check... (${attempt}/60)"
            sleep 10
          done

          # 🔍 調整點 4：增加多維度診斷輸出 (Diagnostic Output)
          # 若應用程式逾時仍未健康，不再只輸出單一錯誤，而是即時 dump 出實時狀態、Spring Stack Trace 以及基礎設施日誌，精確指出連線卡死的核心點
          if [ "$APP_READY" != "true" ]; then
            echo "❌ 錯誤：Spring Boot 應用程式健康檢查逾時失敗！正在啟動自動排查診斷..."
            echo "========= [1. 目前容器集群狀態] ========="
            docker compose ps
            echo "========= [2. Spring Boot 應用日誌 (最後 200 行)] ========="
            docker compose logs --no-color --tail=200 app
            echo "========= [3. SQL Server 關係型資料庫日誌] ========="
            docker compose logs --no-color --tail=50 sqlserver
            echo "========= [4. Redis 高效能快取日誌] ========="
            docker compose logs --no-color --tail=50 redis
            exit 1
          fi

          # 🧪 驗證 Redis 可正常回應
          if [ "$(docker exec tlbank-redis redis-cli ping)" != "PONG" ]; then
            echo "Redis health verification failed."
            docker compose logs --no-color --tail=100 redis
            exit 1
          fi

          # ✅ 再次輸出完整服務狀態，作為部署成功紀錄
          docker compose ps
          echo "TLBank staging deployment completed successfully."

          # 🧹 清理沒有被任何容器使用的舊映像層，避免本機磁碟長期累積
          docker image prune -f