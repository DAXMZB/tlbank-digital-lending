# ==========================================
# TLBank CI — monorepo 根目錄工作流程
# 專案目錄結構：Project2/sp2-springboot/ ...
# ==========================================
name: TLBank CI

# 設定觸發自動化流程的條件
on:
  push:
    branches: [ "main", "develop" ]  # 當程式碼推送到 main 或 develop 分支時觸發
    paths:
      - "sp2-springboot/**"          # 只有當 sp2-springboot 資料夾內的檔案有變動時才執行
      - ".github/workflows/ci.yml"   # 或者 CI 設定檔本身被修改時才執行
  pull_request:
    branches: [ "main", "develop" ]  # 當向 main 或 develop 分支發起合併請求（PR）時觸發
    paths:
      - "sp2-springboot/**"          # 限制變動路徑同上
      - ".github/workflows/ci.yml"

jobs:

  # ----------------------------------------
  # 任務一：Maven 編譯與單元測試
  # ----------------------------------------
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest            # 使用 GitHub 提供的最新版 Linux 虛擬機環境

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 複製下載專案原始碼（已升級至 v5，解決 Node.js 警告）

      - name: Set up Java 17
        uses: actions/setup-java@v5    # 設定 Java 環境
        with:
          distribution: temurin       # 採用 Eclipse Temurin 發行版 JDK
          java-version: 17            # 指定 Java 17 版本
          cache: maven                # 開啟 Maven 依賴緩存機制
          cache-dependency-path: sp2-springboot/pom.xml # 核心：明確指定子目錄的 pom.xml 作為緩存依據

      - name: Build and test with Maven
        working-directory: sp2-springboot # 關鍵：切換到子目錄中執行指令
        run: mvn clean verify         # 清除舊產物並執行編譯與測試驗證

  # ----------------------------------------
  # 任務二：程式碼品質檢查（與任務一平行執行）
  # ----------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待 build-test 任務成功通過才會執行

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: sp2-springboot/pom.xml

      - name: Run Maven verification
        working-directory: sp2-springboot # 切換到子目錄執行品質驗證
        run: mvn verify

  # ----------------------------------------
  # 任務三：Docker 映像檔建置
  # ----------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待 build-test 任務成功通過才會執行

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Build Docker image
        working-directory: sp2-springboot # 切換到子目錄作為執行起點
        # 讀取指定的 docker/app/Dockerfile，並將當前子目錄 (.) 作為構建上下文
        run: docker build -t tlbank-backend:latest -f docker/app/Dockerfile .

  # ----------------------------------------
  # 任務四：第三方套件漏洞安全掃描
  # 說明：先把 Maven 相依套件下載到本機（~/.m2），
  #       讓 Trivy 能實際掃到 JAR 檔中的 CVE，而非只掃 pom.xml 宣告。
  # ----------------------------------------
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待 build-test 任務成功通過才會執行

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載 Monorepo 全部原始碼（含 sp2-springboot 子專案）

      - name: Set up Java 17
        uses: actions/setup-java@v5   # 掃描前必須先架好 JDK，才能執行 Maven 指令
        with:
          distribution: temurin       # 採用 Eclipse Temurin 發行版 JDK
          java-version: 17            # 對齊 build-test 的 Java 版本
          cache: maven                # 開啟 setup-java 內建的 Maven 依賴快取
          cache-dependency-path: sp2-springboot/pom.xml # 明確指向子專案的 pom.xml 作為快取鍵值

      - name: Resolve Maven dependencies
        working-directory: sp2-springboot # 關鍵：切換到子專案目錄，才能讀到正確的 pom.xml
        # 只下載相依套件、不編譯，把 JAR 全數拉進 ~/.m2 供 Trivy 掃描
        run: mvn -B -q dependency:resolve

      - name: Cache Maven local repository
        uses: actions/cache@v4        # 對 ~/.m2 做一份額外快取，加速後續 CI 執行
        with:
          path: ~/.m2                 # 快取整個 Maven 本機倉庫
          key: maven-${{ hashFiles('sp2-springboot/pom.xml') }} # 以子專案 pom.xml 的 hash 作為主鍵
          restore-keys: |
            maven-                    # 找不到完全相同的 key 時，回退到最近一份 maven- 開頭的快取

      - name: Run Trivy filesystem scan (report only, non-blocking)
        uses: aquasecurity/trivy-action@master # 引入 Trivy 資安掃描工具
        with:
          scan-type: fs               # 掃描類型：檔案系統 (Filesystem)
          scan-ref: sp2-springboot    # 核心：精確指定只掃描 sp2-springboot 這個後端專案目錄
          severity: HIGH,CRITICAL     # 篩選條件：只抓出高風險與嚴重漏洞
          ignore-unfixed: true        # 忽略目前官方尚未釋出修復補丁的漏洞（減少雜訊）
          format: table               # 輸出格式：在日誌中呈現漂亮易讀的表格
          exit-code: 0                # 純報告、不中斷 CI，讓你能點進去完整檢視漏洞日誌