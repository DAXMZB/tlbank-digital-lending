# ==========================================
# TLBank CI — monorepo root workflow
# Repository layout: Project2/sp2-springboot/ ...
# ==========================================
name: TLBank CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "sp2-springboot/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "sp2-springboot/**"
      - ".github/workflows/ci.yml"

jobs:

  build-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: sp2-springboot/pom.xml

      - name: Build and test with Maven
        working-directory: sp2-springboot
        run: mvn clean verify

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: sp2-springboot/pom.xml

      - name: Run Maven verification
        working-directory: sp2-springboot
        run: mvn verify

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: sp2-springboot
        run: docker build -t tlbank-backend:latest -f docker/app/Dockerfile .

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: sp2-springboot
          severity: HIGH,CRITICAL
          exit-code: 1
