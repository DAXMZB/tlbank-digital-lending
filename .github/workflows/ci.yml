# ==========================================================================
# 🏦 TLBank CI/CD — 多專案根目錄自動化完整工作流程 (自託管手動觸發版)
# 功能：原始碼檢出 ➔ Maven 編譯測試 ➔ 程式碼品質檢查 ➔ 資安漏洞掃描 ➔ 鏡像封裝 ➔ 手動本機部署
# 適用環境：本機 Mac (Docker Desktop + SQL Server 2022 容器架構) + Self-hosted Runner
# ==========================================================================
name: TLBank CI/CD

# --------------------------------------------------------------------------
# 🎯 自動化觸發條件設定 (Triggers)
# --------------------------------------------------------------------------
on:
  push:
    branches: [ "main", "develop" ]  # 當程式碼 Push（推送）到 main 或 develop 分支時觸發流程
    paths:
      - "sp2-springboot/**"          # 限制只有當後端子專案資料夾內的檔案有變動時，才執行此 CI/CD
      - ".github/workflows/ci.yml"   # 如果本自動化設定檔本身被修改，也同步觸發執行
  pull_request:
    branches: [ "main", "develop" ]  # 對 main 或 develop 分支發起合併請求（PR）時觸發
    paths:
      - "sp2-springboot/**"          # 限制只有 PR 內容涉及後端專案時才進行品質審查
      - ".github/workflows/ci.yml"
  workflow_dispatch:                 # 🖐️ 手動觸發開關：在 GitHub 網頁上生成「Run workflow」按鈕。
                                      # 讓 Staging 部署完全由自己手動決定時機，平時 Push 絕不驚動本機。

# --------------------------------------------------------------------------
# 🔒 執行身份存取權限控管 (Permissions)
# --------------------------------------------------------------------------
permissions:
  contents: read                     # 允許 GitHub Actions 安全讀取本專案的原始碼內容
  packages: write                    # 允許 GitHub Actions 寫入與上傳 Docker 映像檔到 GitHub 套件庫 (GHCR)

# --------------------------------------------------------------------------
# 🌐 全域環境變數定義 (Global Environment Variables)
# --------------------------------------------------------------------------
env:
  APP_DIR: sp2-springboot            # 單一真相來源：宣告後端主專案的資料夾名稱，方便後續所有任務統一引用

jobs:

  # ==========================================================================
  # 🧪 任務一：Maven 編譯與單元測試 (Build and Test) — 跑在 GitHub 雲端
  # ==========================================================================
  build-test:
    name: Build and Test             # 在 GitHub 儀表板上顯示的任務區塊名稱
    runs-on: ubuntu-latest            # 配置 GitHub 雲端標準的 Linux (Ubuntu) 虛擬機作為運行環境

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 步驟 1：檢出並下載本專案的最新原始碼到虛擬機中

      - name: Set up Java 17
        uses: actions/setup-java@v5    # 步驟 2：快速配置 Java 17 JDK 編譯環境
        with:
          distribution: temurin      # 採用 Eclipse Temurin 發行版
          java-version: 17           # 嚴格指定使用 Java 17 版本進行構建
          cache: maven                # 效能優化：開啟內建的 Maven 快取，job 結束時自動保存，下次執行自動還原
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml # 以子目錄下的 pom.xml 作為快取是否過期的核對密鑰

      - name: Build and test with Maven
        working-directory: ${{ env.APP_DIR }} # 切換工作路徑至後端子專案資料夾下
        run: mvn clean verify         # 執行清理、編譯、單元測試與整合測試，確保程式碼邏輯無誤

  # ==========================================================================
  # 🔍 任務二：程式碼品質與靜態檢查 (Code Quality) — 跑在 GitHub 雲端
  # ==========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-test                 # 嚴格防線：必須等待「任務一：編譯與測試」成功通過後，才放行此任務

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      - name: Set up Java 17
        uses: actions/setup-java@v5    # 載入 Java 17環境
        with:
          distribution: temurin
          java-version: 17
          cache: maven                # 繼續共享並復用上一步保存的 Maven 快取，省去重跑下載的時間
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml

      - name: Run Maven verification
        working-directory: ${{ env.APP_DIR }}
        run: mvn verify               # 執行靜態代碼驗證，用以觸發專案內部設定的代碼 Style 檢查插件

  # ==========================================================================
  # 🛡️ 任務三：第三方套件安全漏洞掃描 (Dependency Scan) — 跑在 GitHub 雲端
  # ==========================================================================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待「任務一：編譯與測試」成功通過後，才執行

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      # 💡 先配置 Java；setup-java 內建的 cache 會在此步驟自動將本地依賴還原至虛擬機的 ~/.m2
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven                # 確保在進行資安分析前，~/.m2 目錄就已經成功的還原完成
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml

      # 💡 流量防護：預先在本地將專案相依套件全數解析完畢，阻斷 Trivy 觸發遠端中央倉庫 429 限流問題
      - name: Resolve Maven dependencies
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B -q dependency:resolve # 以批次、安靜模式下載解析套件至虛擬機本地

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0 # 鎖定穩定版資安套件，防止追蹤 master 分支時因上游改版導致 CI 故障
        with:
          scan-type: fs               # 指定掃描類型為：檔案系統本體掃描 (Filesystem)
          scan-ref: ${{ env.APP_DIR }} # 精確指定只掃描後端子專案目錄，剔除其餘雜訊
          severity: HIGH,CRITICAL     # 風險控管：唯有發現「高風險」與「災難級嚴重」的漏洞才會呈報
          ignore-unfixed: true        # 過濾雜訊：忽略目前全球官方尚未釋出修復補丁的漏洞，專注在可修復的依賴上
          format: table               # 格式化輸出：以清晰的表格形式將漏洞報告呈現在 GitHub 日誌中
          exit-code: 0                # 報告模式：純產出漏洞報告，不因為發現舊漏洞而強行掐斷或卡死後續的流程

  # ==========================================================================
  # 🐳 任務四：Docker 映像檔封裝與上傳 (Build and Push Image) — 跑在 GitHub 雲端
  # ==========================================================================
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # 鋼鐵防禦鏈：必須前面三個 CI 任務（測試、品質、資安）全數通過，才放行進入封裝生產線
    needs: [build-test, code-quality, dependency-scan]

    # 🟢 門禁控管：若是正常的程式碼 Push，必須是在 main 分支才執行打包；
    # 若是在網頁上手動點擊 workflow_dispatch，也放行進行封裝，確保部署時拿得到最新映像檔
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      # 💡 GHCR 路徑規範：GitHub 映像檔倉庫要求路徑必須「全小寫」。透過 Linux 的 tr 指令將大寫帳號轉為全小寫
      - name: Set lowercase GHCR image name
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER}/tlbank-backend" >> "$GITHUB_ENV" # 寫入環境變數供後續步驟引用

      - name: Login to GHCR
        uses: docker/login-action@v3   # 登入到 GitHub Container Registry 映像檔倉庫
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # 自動獲取當前觸發流程的 GitHub 帳號名稱
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 Actions 內建短暫產生的權杖安全登入

      # 讓 Buildx 能交叉編譯 arm64，供本機 Apple Silicon Runner 原生執行（避免 QEMU 模擬 amd64 過慢）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # 呼叫官方進階 Docker 打包套件
        with:
          context: ${{ env.APP_DIR }} # 宣告 Docker 構建的上下文起點為後端專案目錄
          file: ${{ env.APP_DIR }}/docker/app/Dockerfile # 讀取子專案目錄底下的 Dockerfile 封裝食譜
          push: true                  # 打包成功後，立刻推送到 GitHub 雲端映像檔倉庫上
          # 同時產出 amd64（雲端慣用）與 arm64（本機 Mac Runner 原生），部署時由 Docker 自動選對架構
          platforms: linux/amd64,linux/arm64
          tags: |                     # 同時為這枚映像檔貼上兩種識別標籤：
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ==========================================================================
  # 🚀 任務五：本機 Mac 手動部署 (Deploy to Staging Server) —— 僅限手動觸發
  # 部署模板唯一來源：sp2-springboot/docker-compose.deploy.yml（不再以 heredoc 維護第二份 Compose）
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, macos]
    needs: build-and-push-image
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Set lowercase GHCR image name
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER}/tlbank-backend" >> "$GITHUB_ENV"

      - name: Prepare deploy directory from repository template
        shell: bash
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
          COMPOSE_PROJECT_NAME: tlbank
          # Secrets 經 env 注入；禁止 echo／set -x／寫入 repository
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          set +H

          DEPLOY_DIR="${HOME}/tlbank"
          SOURCE_COMPOSE="${GITHUB_WORKSPACE}/sp2-springboot/docker-compose.deploy.yml"
          SOURCE_INIT="${GITHUB_WORKSPACE}/sp2-springboot/docker/sqlserver/init"

          mkdir -p "$DEPLOY_DIR/docker/sqlserver/init"
          cp "$SOURCE_COMPOSE" "$DEPLOY_DIR/docker-compose.yml"
          cp "$SOURCE_INIT"/*.sql "$DEPLOY_DIR/docker/sqlserver/init/"

          # 僅回報 Secret 是否存在（yes/no），不輸出任何值或長度
          if [ -n "${APP_DB_PASSWORD}" ]; then echo "secret APP_DB_PASSWORD: yes"; else echo "secret APP_DB_PASSWORD: no"; fi
          if [ -n "${MSSQL_SA_PASSWORD}" ]; then echo "secret MSSQL_SA_PASSWORD: yes"; else echo "secret MSSQL_SA_PASSWORD: no"; fi
          if [ -n "${GHCR_USERNAME}" ]; then echo "secret GHCR_USERNAME: yes"; else echo "secret GHCR_USERNAME: no"; fi
          if [ -n "${GHCR_TOKEN}" ]; then echo "secret GHCR_TOKEN: yes"; else echo "secret GHCR_TOKEN: no"; fi

          if [ -z "${IMAGE_NAME:-}" ]; then
            echo "APP_IMAGE / IMAGE_NAME is not set."
            exit 1
          fi
          echo "APP_IMAGE=${IMAGE_NAME}:latest"

          if [ -z "${MSSQL_SA_PASSWORD}" ]; then
            echo "MSSQL_SA_PASSWORD is missing or empty."
            echo "Update the MSSQL_SA_PASSWORD GitHub Actions repository secret."
            exit 1
          fi

          # APP_DB_PASSWORD：必要；長度 >= 16；允許 A-Z a-z 0-9 ! @ # % _ -
          APP_DB_PASSWORD_PATTERN='^[A-Za-z0-9!@#%_-]{16,}$'
          if [[ ! "${APP_DB_PASSWORD}" =~ $APP_DB_PASSWORD_PATTERN ]]; then
            echo "APP_DB_PASSWORD is missing or has an unsupported format."
            echo "Update the APP_DB_PASSWORD GitHub Actions repository secret."
            echo "Use at least 16 characters from A-Z, a-z, 0-9, ! @ # % _ -."
            echo "Do not store the password in the repository."
            exit 1
          fi

          if [ -z "${GHCR_USERNAME}" ] || [ -z "${GHCR_TOKEN}" ]; then
            echo "GHCR_USERNAME and GHCR_TOKEN are required for image pull."
            exit 1
          fi

          # 寫入部署用 .env（chmod 600）；禁止 cat / echo 檔案內容到日誌
          umask 077
          printf '%s\n' \
            "APP_IMAGE=${IMAGE_NAME}:latest" \
            "DB_SA_PASSWORD=${MSSQL_SA_PASSWORD}" \
            "SPRING_DATASOURCE_URL=jdbc:sqlserver://sqlserver:1433;databaseName=TLBankLending;encrypt=true;trustServerCertificate=true" \
            "SPRING_DATASOURCE_USERNAME=tlbank_app" \
            "SPRING_DATASOURCE_PASSWORD=${APP_DB_PASSWORD}" \
            "APP_SESSION_TIMEOUT=30m" \
            "APP_UPLOAD_PATH=/app/uploads" \
            > "$DEPLOY_DIR/.env"
          chmod 600 "$DEPLOY_DIR/.env"

          # 驗證部署模板可解析（不印出 config 內容，避免環境變數外洩）
          # 不使用 config --quiet：部分 Runner 的 Compose 外掛不支援，且可能被誤解析為 docker 全域旗標
          echo "Validating deployment Compose configuration..."
          docker version >/dev/null
          if ! docker compose version >/dev/null 2>&1; then
            echo "Docker Compose plugin is unavailable on this runner."
            exit 1
          fi
          docker compose version
          (
            cd "$DEPLOY_DIR"
            docker compose --env-file .env -f docker-compose.yml config >/dev/null
            echo "Deployment Compose configuration is valid."
            echo "compose services:"
            docker compose --env-file .env -f docker-compose.yml config --services
          )

          echo "Deploy files prepared under \$HOME/tlbank (compose + init SQL + .env)."

      - name: Pull and restart containers locally
        shell: bash
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
          COMPOSE_PROJECT_NAME: tlbank
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail

          DEPLOY_DIR="${HOME}/tlbank"
          cd "$DEPLOY_DIR"

          mkdir -p "$DOCKER_CONFIG"
          if [ -d "$HOME/.docker/cli-plugins" ]; then
            mkdir -p "$DOCKER_CONFIG/cli-plugins"
            cp -a "$HOME/.docker/cli-plugins/." "$DOCKER_CONFIG/cli-plugins/"
          fi

          docker compose version

          # 使用 stdin 登入 GHCR；禁止 docker login -p、禁止 echo Token
          printf '%s\n' "${GHCR_TOKEN}" | docker --config "$DOCKER_CONFIG" login ghcr.io \
            -u "${GHCR_USERNAME}" --password-stdin

          # 不使用 docker compose down -v，避免刪除 named volumes
          docker compose down --remove-orphans 2>/dev/null || true

          for c in tlbank-sqlserver tlbank-db-init tlbank-redis tlbank-app; do
            docker rm -f "$c" >/dev/null 2>&1 || true
          done

          docker compose pull

          # compose up 失敗時必須輸出 db-init 診斷，不可因 set -e 提前退出
          set +e
          docker compose up -d --remove-orphans
          COMPOSE_UP_EXIT=$?
          set -e

          if [ "$COMPOSE_UP_EXIT" -ne 0 ]; then
            echo "docker compose up failed with exit code ${COMPOSE_UP_EXIT}."

            echo "===== docker compose ps -a ====="
            docker compose ps -a || true

            echo "===== compose service names (no env/secrets) ====="
            docker compose config --services || true

            echo "===== db-init state ====="
            docker inspect tlbank-db-init \
              --format='status={{.State.Status}} exitCode={{.State.ExitCode}} error={{.State.Error}}' \
              || true

            echo "===== db-init logs ====="
            docker logs --timestamps --tail=1500 tlbank-db-init || true
            docker compose logs --no-color --tail=1500 db-init || true

            echo "===== sqlserver logs ====="
            docker compose logs --no-color --tail=500 sqlserver || true

            echo "===== redis logs ====="
            docker compose logs --no-color --tail=200 redis || true

            exit "$COMPOSE_UP_EXIT"
          fi

          echo "===== [部署後] docker compose ps -a ====="
          docker compose ps -a

          echo "Waiting for Actuator /health UP (up to 10 minutes)..."
          APP_READY=false
          for attempt in $(seq 1 60); do
            HEALTH_BODY=$(curl -fsS "http://localhost:8080/actuator/health" 2>/dev/null || true)
            if echo "$HEALTH_BODY" | grep -q '"status":"UP"'; then
              APP_READY=true
              echo "Spring Boot application is healthy on attempt ${attempt}/60."
              break
            fi
            if [ $((attempt % 10)) -eq 0 ]; then
              echo "Health probe attempt ${attempt}/60 body=${HEALTH_BODY:-<empty>}"
              docker inspect tlbank-app \
                --format='status={{.State.Status}} exitCode={{.State.ExitCode}} restartCount={{.RestartCount}}' \
                2>/dev/null || true
            fi
            echo "Waiting for application health check... (${attempt}/60)"
            sleep 10
          done

          if [ "$APP_READY" != "true" ]; then
            echo "Application health check failed."
            echo "===== [診斷] docker compose ps -a ====="
            docker compose ps -a || true

            echo "===== [診斷] docker inspect tlbank-app ====="
            docker inspect tlbank-app \
              --format='status={{.State.Status}} exitCode={{.State.ExitCode}} restartCount={{.RestartCount}} error={{.State.Error}}' \
              || true

            echo "===== [診斷] docker inspect tlbank-db-init ====="
            docker inspect tlbank-db-init \
              --format='status={{.State.Status}} exitCode={{.State.ExitCode}} error={{.State.Error}}' \
              || true

            echo "===== app container logs ====="
            docker logs --timestamps --tail=1500 tlbank-app || true

            echo "===== [診斷] db-init logs ====="
            docker compose logs --no-color --tail=300 db-init || true
            echo "===== [診斷] sqlserver logs ====="
            docker compose logs --no-color --tail=300 sqlserver || true
            echo "===== [診斷] redis logs ====="
            docker compose logs --no-color --tail=300 redis || true

            echo "===== app named volume files ====="
            APP_LOG_VOL="$(
              docker volume ls --format '{{.Name}}' | grep -E '^tlbank_app-logs$' \
              || docker volume ls --format '{{.Name}}' | grep -E 'app-logs' | head -n 1 \
              || true
            )"
            if [ -n "${APP_LOG_VOL}" ]; then
              echo "Using volume: ${APP_LOG_VOL}"
              docker run --rm \
                -v "${APP_LOG_VOL}:/logs:ro" \
                alpine:3.20 \
                sh -c '
                  ls -lan /logs || true
                  for file in /logs/*.log; do
                    [ -f "$file" ] || continue
                    echo "===== $file ====="
                    tail -n 1000 "$file" || true
                  done
                ' || true
            else
              echo "No app-logs volume matched."
            fi

            echo "===== curl -i actuator/health ====="
            curl -i --max-time 10 http://localhost:8080/actuator/health || true

            echo "===== app env keys (values redacted) ====="
            docker inspect tlbank-app \
              --format='{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null \
              | sed 's/=.*$/=<redacted>/' \
              | grep -E '^(SPRING_PROFILES_ACTIVE|SPRING_DATASOURCE_URL|SPRING_DATASOURCE_USERNAME|SPRING_DATA_REDIS_|TLBANK_|LOG_|APP_UPLOAD)' \
              || true

            exit 1
          fi

          if [ "$(docker exec tlbank-redis redis-cli ping)" != "PONG" ]; then
            echo "Redis health verification failed."
            docker compose logs --no-color --tail=100 redis || true
            exit 1
          fi

          docker compose ps -a
          echo "TLBank staging deployment completed successfully."
          docker image prune -f