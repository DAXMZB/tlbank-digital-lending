# ==========================================================================
# 🏦 TLBank CI/CD — 多專案根目錄自動化完整工作流程 (自託管手動觸發版)
# 功能：原始碼檢出 ➔ Maven 編譯測試 ➔ 程式碼品質檢查 ➔ 資安漏洞掃描 ➔ 鏡像封裝 ➔ 手動本機部署
# 適用環境：本機 Mac (Docker Desktop + SQL Server 2022 容器架構) + Self-hosted Runner
# ==========================================================================
name: TLBank CI/CD

# --------------------------------------------------------------------------
# 🎯 自動化觸發條件設定 (Triggers)
# --------------------------------------------------------------------------
on:
  push:
    branches: [ "main", "develop" ]  # 當程式碼 Push（推送）到 main 或 develop 分支時觸發流程
    paths:
      - "sp2-springboot/**"          # 限制只有當後端子專案資料夾內的檔案有變動時，才執行此 CI/CD
      - ".github/workflows/ci.yml"   # 如果本自動化設定檔本身被修改，也同步觸發執行
  pull_request:
    branches: [ "main", "develop" ]  # 對 main 或 develop 分支發起合併請求（PR）時觸發
    paths:
      - "sp2-springboot/**"          # 限制只有 PR 內容涉及後端專案時才進行品質審查
      - ".github/workflows/ci.yml"
  workflow_dispatch:                 # 🖐️ 手動觸發開關：在 GitHub 網頁上生成「Run workflow」按鈕。
                                      # 讓 Staging 部署完全由你自己手動決定時機，平時 Push 絕不驚動本機。

# --------------------------------------------------------------------------
# 🔒 執行身份存取權限控管 (Permissions)
# --------------------------------------------------------------------------
permissions:
  contents: read                     # 允許 GitHub Actions 安全讀取本專案的原始碼內容
  packages: write                    # 允許 GitHub Actions 寫入與上傳 Docker 映像檔到 GitHub 套件庫 (GHCR)

# --------------------------------------------------------------------------
# 🌐 全域環境變數定義 (Global Environment Variables)
# --------------------------------------------------------------------------
env:
  APP_DIR: sp2-springboot            # 單一真相來源：宣告後端主專案的資料夾名稱，方便後續所有任務統一引用

jobs:

  # ==========================================================================
  # 🧪 任務一：Maven 編譯與單元測試 (Build and Test) — 跑在 GitHub 雲端
  # ==========================================================================
  build-test:
    name: Build and Test             # 在 GitHub 儀表板上顯示的任務區塊名稱
    runs-on: ubuntu-latest            # 配置 GitHub 雲端標準的 Linux (Ubuntu) 虛擬機作為運行環境

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 步驟 1：檢出並下載本專案的最新原始碼到虛擬機中

      - name: Set up Java 17
        uses: actions/setup-java@v5    # 步驟 2：快速配置 Java 17 JDK 編譯環境
        with:
          distribution: temurin      # 採用業界主流、穩定的 Eclipse Temurin 發行版
          java-version: 17           # 嚴格指定使用 Java 17 版本進行構建
          cache: maven                # 效能優化：開啟內建的 Maven 快取，job 結束時自動保存，下次執行自動還原
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml # 以子目錄下的 pom.xml 作為快取是否過期的核對密鑰

      - name: Build and test with Maven
        working-directory: ${{ env.APP_DIR }} # 切換工作路徑至後端子專案資料夾下
        run: mvn clean verify         # 執行清理、編譯、單元測試與整合測試，確保程式碼邏輯無誤

  # ==========================================================================
  # 🔍 任務二：程式碼品質與靜態檢查 (Code Quality) — 跑在 GitHub 雲端
  # ==========================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-test                 # 嚴格防線：必須等待「任務一：編譯與測試」成功通過後，才放行此任務

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      - name: Set up Java 17
        uses: actions/setup-java@v5    # 載入 Java 17 環境
        with:
          distribution: temurin
          java-version: 17
          cache: maven                # 繼續共享並復用上一步保存的 Maven 快取，省去重跑下載的時間
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml

      - name: Run Maven verification
        working-directory: ${{ env.APP_DIR }}
        run: mvn verify               # 執行靜態代碼驗證，用以觸發專案內部設定的代碼 Style 檢查插件

  # ==========================================================================
  # 🛡️ 任務三：第三方套件安全漏洞掃描 (Dependency Scan) — 跑在 GitHub 雲端
  # ==========================================================================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待「任務一：編譯與測試」成功通過後，才執行

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      # 💡 先配置 Java；setup-java 內建的 cache 會在此步驟自動將本地依賴還原至虛擬機的 ~/.m2
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven                # 確保在進行資安分析前，~/.m2 目錄就已經成功的還原完成
          cache-dependency-path: ${{ env.APP_DIR }}/pom.xml

      # 💡 流量防護：預先在本地將專案相依套件全數解析完畢，阻斷 Trivy 觸發遠端中央倉庫 429 限流問題
      - name: Resolve Maven dependencies
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B -q dependency:resolve # 以批次、安靜模式下載解析套件至虛擬機本地

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0 # 鎖定穩定版資安套件，防止追蹤 master 分支時因上游改版導致 CI 故障
        with:
          scan-type: fs               # 指定掃描類型為：檔案系統本體掃描 (Filesystem)
          scan-ref: ${{ env.APP_DIR }} # 精確指定只掃描我的後端子專案目錄，剔除其餘雜訊
          severity: HIGH,CRITICAL     # 風險控管：唯有發現「高風險」與「災難級嚴重」的漏洞才會呈報
          ignore-unfixed: true        # 過濾雜訊：忽略目前全球官方尚未釋出修復補丁的漏洞，專注在可修復的依賴上
          format: table               # 格式化輸出：以清晰的表格形式將漏洞報告呈現在 GitHub 日誌中
          exit-code: 0                # 報告模式：純產出漏洞報告，不因為發現舊漏洞而強行掐斷或卡死後續的流程

  # ==========================================================================
  # 🐳 任務四：Docker 映像檔封裝與上傳 (Build and Push Image) — 跑在 GitHub 雲端
  # ==========================================================================
  build-and-push-image:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # 鋼鐵防禦鏈：必須前面三個 CI 任務（測試、品質、資安）全數通過，才放行進入封裝生產線
    needs: [build-test, code-quality, dependency-scan]

    # 🟢 門禁控管：若是正常的程式碼 Push，必須是在 main 分支才執行打包；
    # 若是在網頁上手動點擊 workflow_dispatch，也放行進行封裝，確保部署時拿得到最新映像檔
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5     # 下載專案原始碼

      # 💡 GHCR 路徑規範：GitHub 映像檔倉庫要求路徑必須「全小寫」。透過 Linux 的 tr 指令將大寫帳號轉為全小寫
      - name: Set lowercase GHCR image name
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER}/tlbank-backend" >> "$GITHUB_ENV" # 寫入環境變數供後續步驟引用

      - name: Login to GHCR
        uses: docker/login-action@v3   # 登入到 GitHub Container Registry 映像檔倉庫
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # 自動獲取當前觸發流程的 GitHub 帳號名稱
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 Actions 內建短暫產生的權杖安全登入

      - name: Build and push Docker image
        uses: docker/build-push-action@v6 # 呼叫官方進階 Docker 打包套件
        with:
          context: ${{ env.APP_DIR }} # 宣告 Docker 構建的上下文起點為後端專案目錄
          file: ${{ env.APP_DIR }}/docker/app/Dockerfile # 讀取子專案目錄底下的 Dockerfile 封裝食譜
          push: true                  # 打包成功後，立刻推送到 GitHub 雲端映像檔倉庫上
          tags: |                     # 同時為這枚映像檔貼上兩種識別標籤：
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ==========================================================================
  # 🚀 任務五：本機 Mac 手動部署 (Deploy to Staging Server) —— 🎯 跑在你的 Mac 本機上！
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: [self-hosted, macos]      # 🎯 核心更動：指定由你 Mac 上註冊的自託管執行器（Self-hosted Runner）主動接單執行
    needs: build-and-push-image       # 順序控管：必須等待新版映像檔在雲端封裝成功後，才能進行部署更新

    # 🔒 鋼鐵門禁：只有在 GitHub 網頁上手動點擊「Run workflow」觸發時，本部署任務才會啟動！
    # 平常任何 git push ，CI 主線永遠保持 100% 綠燈
    if: github.event_name == 'workflow_dispatch'

    steps:
      # 💡 為了在 Mac 的環境中正確獲取全小寫的 GitHub 映像檔路徑，在此重新計算並存入本機 runner 環境變數中
      - name: Set lowercase GHCR image name
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${OWNER}/tlbank-backend" >> "$GITHUB_ENV"

      # 🛠️ 直接在 Mac 本機硬碟中動態建立或更新符合專案規格的 docker-compose.yml 檔案
      - name: Write docker-compose.yml on local Mac
        run: |
          set -e                       # 防禦語法：只要有任何一條指令出錯，立刻中斷自動化流程
          mkdir -p ~/tlbank              # 在 Mac 家目錄下建立一個維運專案專屬的資料夾
          cd ~/tlbank                  # 切換進該資料夾內

          # 💡 使用 INNER_EOF 機制建立檔案。內部的環境變數（如 $IMAGE_NAME）會留到本機執行時才展開
          # 內嵌的雙大括號（如 secrets.MSSQL_SA_PASSWORD）會在 GitHub 端置換為在 Docker Desktop 查到的真實密碼
          cat > docker-compose.yml << 'INNER_EOF'
          services:
            sqlserver:
              image: mcr.microsoft.com/mssql/server:2022-latest #  SQL Server 2022 映像檔（純字串，非 Markdown 連結）
              container_name: tlbank-sqlserver
              environment:
                ACCEPT_EULA: "Y"                           # 接受微軟終端使用者授權合約
                MSSQL_SA_PASSWORD: "${{ secrets.MSSQL_SA_PASSWORD }}" # 從 GitHub 安全通道帶入本機真實密碼 
                MSSQL_PID: Developer                       # 指定運行版本為免費授權的開發者版本 (Developer Edition)
              ports:
                - "1433:1433"                              # 將 Mac 本地的 1433 埠口與資料庫容器內部 1433 連接埠對接映射
              volumes:
                - sqlserver-data:/var/opt/mssql            # 持久化設定：將資料檔案鎖在 Mac 硬碟磁碟卷中，重啟容器資料不會遺失
              networks:
                - tlbank-network                            # 把資料庫劃歸進獨立的虛擬內部網路中
              healthcheck:                                 # 健康檢查：每 15 秒自行驗證一次 SQL 連線，確保資料庫真正「活著」
                test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${{ secrets.MSSQL_SA_PASSWORD }}" -C -Q "SELECT 1" || exit 1
                interval: 15s
                timeout: 10s
                retries: 10
                start_period: 40s

            db-init:
              image: mcr.microsoft.com/mssql/server:2022-latest # 復用同一個微軟 SQL 映像檔進行自動化建庫
              container_name: tlbank-db-init
              depends_on:
                sqlserver:
                  condition: service_healthy              # 嚴格相依：必須等待 sqlserver 通過健康檢查、可以接客了，本初始化容器才開工
              environment:
                MSSQL_SA_PASSWORD: "${{ secrets.MSSQL_SA_PASSWORD }}"
              networks:
                - tlbank-network
              entrypoint: ["/bin/bash", "-c"]             # 使用 bash 蓋掉原本微軟預設的啟動入口
              command:                                     # 一鍵全自動化建庫：登入 sa，如果 tlbank 資料庫還不存在，就秒速自動建立它！
                - >
                  /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "${{ secrets.MSSQL_SA_PASSWORD }}" -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'tlbank') CREATE DATABASE tlbank;"
              restart: "no"                                # 本工作屬於一次性任務，跑完就自毀休眠，絕對不重複重啟

            app:
              image: ${{ env.IMAGE_NAME }}:latest         # 讀取剛剛在雲端任務四由 Linux 虛擬機最新打包、封裝出爐的 Java 後端應用程式
              container_name: tlbank-app
              depends_on:
                sqlserver:
                  condition: service_healthy              # 必須等資料庫健康就緒
                db-init:
                  condition: service_completed_successfully # 且必須等 db-init 自動建庫成功結束後，Java 程式才准啟動
              ports:
                - "8080:8080"                              # 開放 Mac 的 8080 埠口，供外面呼叫 API 與 Swagger 網頁
              environment:                                 # 🛠️ 核心對接：為 Spring Boot 後端注入最重要的環境參數（已加雙引號防範特殊符號解析崩潰）
                SPRING_PROFILES_ACTIVE: staging            # 啟動 Staging 生產測試設定組
                SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=tlbank;encrypt=false; # 網內直連：直接以內部容器名稱 sqlserver 作為連線 Host
                SPRING_DATASOURCE_USERNAME: sa             # 以管理員 sa 身份登入
                SPRING_DATASOURCE_PASSWORD: "${{ secrets.MSSQL_SA_PASSWORD }}" # 帶入密碼
                SERVER_SERVLET_SESSION_TIMEOUT: 30m        # 網頁 Session 超時時間設為 30 分鐘
                TLBANK_UPLOAD_BASE_PATH: /app/uploads     # 掛載在 Linux 容器內的文件上傳實體路徑
              volumes:
                - app-uploads:/app/uploads                 # 持久化：客戶上傳的財力證明、雙證件等實體檔案，持久化保存到 Mac 本地硬碟中
                - app-logs:/app/logs                       # 將 Spring Boot 的運行日誌（Logs）導流出來方便隨時在本機查看
              networks:
                - tlbank-network

          volumes:
            sqlserver-data:                                # 宣告與向系統註冊這三個實體持久化磁碟卷名稱
            app-uploads:
            app-logs:

          networks:
            tlbank-network:
              driver: bridge                               # 採用橋接網路模式，將上述三個容器鎖在同一個封閉安全的內網網段中
          INNER_EOF

      # 🎯 本機直發部署：完全在你的 Mac 本機背景發動指令，不需要任何 SSH 遠端金鑰
      - name: Pull and restart containers locally
        working-directory: /Users/lidong/tlbank                   # 直接在 Mac 本地的專案維運目錄下執行
        run: |
          set -e
          # 🔐 利用在 GitHub 設定好的 Token 讓 Mac 登入 GHCR，解鎖拉取私有映像檔的權限
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          
          # 🚀 執行本地無縫升級：重拉最新 Java 鏡像檔 ➔ 背景啟動所有服務 ➔ 強制清空 Mac 內部老舊、殘留的垃圾映像檔以釋放空間
          docker compose pull app
          docker compose up -d
          docker image prune -f