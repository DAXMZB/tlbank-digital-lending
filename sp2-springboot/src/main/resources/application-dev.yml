spring:
  datasource:
    url: jdbc:h2:mem:tlbank_lending;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    locations: classpath:db/migration,classpath:db/dev-seed

logging:
  level:
    root: INFO
    com.tlbank.lending: DEBUG
    org.hibernate.SQL: DEBUG

tlbank:
  upload:
    base-path: ${TLBANK_UPLOAD_BASE_PATH:${user.dir}/uploads/dev}
  scheduler:
    otp-cleanup:
      cron: "0 */1 * * * *"
  idempotency:
    store: redis
    ttl-hours: 24
    key-prefix: "idempotency:applications:"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
