spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  flyway:
    locations: classpath:db/migration-sqlserver

server:
  servlet:
    session:
      timeout: ${APP_SESSION_TIMEOUT:30m}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    com.tlbank.lending: INFO

tlbank:
  notification:
    mode: mock
  upload:
    base-path: ${APP_UPLOAD_PATH:/app/uploads}
