# ==========================================================================
# TLBank 預發布環境設定
# 適用環境：本機 Mac 容器化部署與測試伺服器
# ==========================================================================

spring:

  # ------------------------------------------------------------------------
  # SQL Server 資料庫連線設定
  # ------------------------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

    # HikariCP 資料庫連線池設定
    hikari:
      # 允許連線池維持的最大連線數
      maximum-pool-size: 10

      # 啟動時若資料庫尚未準備完成，最多等待 60 秒取得連線
      connection-timeout: 60000

      # 連線驗證逾時時間
      validation-timeout: 10000

      # 閒置連線最多保留 10 分鐘
      idle-timeout: 600000

      # 單一連線最多使用 30 分鐘
      max-lifetime: 1800000

      # 啟動階段不要求立即建立固定數量的連線
      minimum-idle: 0

      # 允許應用程式啟動時等待資料庫，而不是立即結束程序
      initialization-fail-timeout: 60000

  # ------------------------------------------------------------------------
  # JPA 與 Hibernate 設定
  # ------------------------------------------------------------------------
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  # ------------------------------------------------------------------------
  # Flyway 資料庫版本管理設定
  # ------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration-sqlserver

    # 最多重試資料庫連線 20 次，避免 SQL Server 尚在暖機時立即失敗
    connect-retries: 20

    # 每次重試之間等待 10 秒
    connect-retries-interval: 10

# --------------------------------------------------------------------------
# Web Server 設定
# --------------------------------------------------------------------------
server:
  servlet:
    session:
      timeout: ${APP_SESSION_TIMEOUT:30m}

# --------------------------------------------------------------------------
# Spring Boot Actuator 健康檢查設定
# --------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      enabled: true

      # 預發布環境顯示健康檢查細節，方便排除資料庫與 Redis 問題
      show-details: always

  health:
    # 啟用 Kubernetes 風格的 liveness 與 readiness 狀態
    probes:
      enabled: true

# --------------------------------------------------------------------------
# OpenAPI 與 Swagger UI 設定
# --------------------------------------------------------------------------
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# --------------------------------------------------------------------------
# 日誌設定
# --------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.tlbank.lending: INFO
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO

# --------------------------------------------------------------------------
# TLBank 自訂設定
# --------------------------------------------------------------------------
tlbank:
  notification:
    mode: mock

  upload:
    base-path: ${APP_UPLOAD_PATH:/app/uploads}