# ==========================================================================
# 🏦 TLBank 預發布環境設定 (Staging Profile)
# 適用環境：本機 Mac 容器化維運架構 / 測試伺服器環境
# ==========================================================================

spring:
  # ------------------------------------------------------------------------
  # 🔌 資料庫連線配置 (SQL Server)
  # ------------------------------------------------------------------------
  datasource:
    # 從外部環境變數動態注入資料庫連接字串 (JDBC URL)
    url: ${SPRING_DATASOURCE_URL}
    # 從外部環境變數動態注入資料庫登入帳號
    username: ${SPRING_DATASOURCE_USERNAME}
    # 從外部環境變數動態注入資料庫登入密碼
    password: ${SPRING_DATASOURCE_PASSWORD}
    # 指定微軟官方提供的 SQL Server JDBC 驅動程式類別
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    
    # ⚡ [關鍵新增] HikariCP 高效能連線池優化調整（防禦 CI/CD 連線延遲）
    hikari:
      # 設定連線池內允許維持的最大連線數
      maximum-pool-size: 10
      # 暖機防禦：拉長等待連線建立的超時時間至 30 秒（30000ms），防止資料庫剛啟動時引發連線池崩潰
      connection-timeout: 30000
      # 連線在池中保持閒置而不被回收的最大時間（10 分鐘）
      idle-timeout: 600000
      # 連線在池中的最大生存時間（30 分鐘），避免長時間佔用產生死鎖
      max-lifetime: 1800000

  # ------------------------------------------------------------------------
  # 🗄️ JPA / Hibernate 實體映射設定
  # ------------------------------------------------------------------------
  jpa:
    # 關閉主控台的 SQL 語法傾印，避免預發布環境日誌過於雜亂並提升效能
    show-sql: false
    properties:
      hibernate:
        # 明確指定 Hibernate 針對 SQL Server 的資料庫方言 (Dialect)
        dialect: org.hibernate.dialect.SQLServerDialect

  # ------------------------------------------------------------------------
  # 🚀 Flyway 資料庫變更版本控管設定
  # ------------------------------------------------------------------------
  flyway:
    # 指定 SQL Server 專屬的資料庫遷移腳本存放路徑 (Classpath)
    locations: classpath:db/migration-sqlserver

# --------------------------------------------------------------------------
# 🌐 網頁伺服器核心配置
# --------------------------------------------------------------------------
server:
  servlet:
    session:
      # 使用者登入 Session 的逾時時間，優先讀取環境變數，預設為 30 分鐘
      timeout: ${APP_SESSION_TIMEOUT:30m}

# --------------------------------------------------------------------------
# 📖 Springdoc OpenAPI / Swagger 線上 API 文件設定
# --------------------------------------------------------------------------
springdoc:
  api-docs:
    # 啟用 OpenAPI 底層 JSON/YAML 數據端點，供前端或外部測試存取
    enabled: true
  swagger-ui:
    # 啟用 Swagger UI 互動式網頁介面，方便在預發布環境直接進行 API 測試
    enabled: true

# --------------------------------------------------------------------------
# 📝 系統日誌輸出等級設定 (Logging)
# --------------------------------------------------------------------------
logging:
  level:
    # 系統全域預設日誌等級，設定為 INFO 級別以兼顧關鍵效能與除錯需求
    root: INFO
    # 針對本專案核心業務邏輯套件，指定日誌等級為 INFO
    com.tlbank.lending: INFO

# --------------------------------------------------------------------------
# 🛠️ TLBank 專案自訂業務參數 (Custom Business Properties)
# --------------------------------------------------------------------------
tlbank:
  notification:
    # 通知發送模式：設定為 mock（模擬模式），此環境下不會發出真實簡訊或郵件
  mode: mock
  upload:
    # 檔案上傳實體根路徑：優先讀取環境變數，預設指向容器內的安全的 /app/uploads 目錄
    base-path: ${APP_UPLOAD_PATH:/app/uploads}