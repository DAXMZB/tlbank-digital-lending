spring:
  application:
    name: tlbank-lending
  profiles:
    active: dev
  task:
    scheduling:
      pool:
        size: 3
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  thymeleaf:
    check-template-location: false

server:
  servlet:
    session:
      timeout: 30m

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

tlbank:
  notification:
    mode: mock
  upload:
    base-path: ./uploads
  scheduler:
    otp-cleanup:
      cron: "0 */5 * * * *"
    cache-refresh:
      cron: "0 0 */6 * * *"
    daily-stats:
      cron: "0 0 1 * * *"
  idempotency:
    ttl-hours: 24
    key-prefix: "idempotency:applications:"
