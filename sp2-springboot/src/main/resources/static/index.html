<!DOCTYPE html>
<html>

<!-- user-info -->
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body bgcolor="#faebd7">
	<table width="100%" border="2" align="center" height=300>
		<tr style="opacity: 0.5;">
			<td id="title-placeholder" colspan=2 bgcolor=black
				style="opacity: 0.5" align=center></td>
		</tr>


		<tr id="auth-row" align=center>
			<td><a href=login.html style="color: brown">登入</a></td>
			<td><a href="addMember.html">註冊</a></td>
		</tr>
		<tr>
			<!-- 增設檢查是否登入 -->
			<td><a href="javascript:void(0)"
				onclick="checkLoginGo('memberList.html')"
				style="color: blue; text-decoration: underline;">會員清單</a></td>
		</tr>
		<tr>
			<!-- 增設檢查是否登入 -->
			<td><a href="javascript:void(0)"
				onclick="checkLoginGo('productList.html')"
				style="color: blue; text-decoration: underline;">商品瀏覽</a></td>
		</tr>
		<tr>
			<!-- 增設檢查是否登入 -->
			<td><a href="javascript:void(0)"
				onclick="checkLoginGo(`orderList.html`)"
				style="color: blue; text-decoration: underline;">購物車</a></td>
		</tr>
		<!-- 首頁檔案 -->
		<script>
			$(function() {
				//put title.html in placeholder
				$("#title-placeholder").load("title.html");
			});

			// 新增：檢查登入並跳轉的函式
			function checkLoginGo(targetUrl) {
				//從 sessionStorage 讀取 userName 或 memberId (根據login.html登入名字)
				let isLogin = sessionStorage.getItem("userName");

				if (isLogin) {
					//已登入：執行跳轉
					window.location.href = targetUrl;
				} else {
					//未登入：跳出警告並引導至登入頁
					alert("請先登入，才可查看會員清單！");
					window.location.href = "login.html";
				}
			}
		</script>
	</table>
	<table width="100%" border="2" height=700>
		<tr></tr>
	</table>
</body>
</html>
