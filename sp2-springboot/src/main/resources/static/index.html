<!DOCTYPE html>
<html>

<!-- user-info -->
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- 入 Vue 3 以及 Tailwind CSS -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body >
	<div id="app" class="min-h-screen bg-gray-50">
    <nav class="bg-sky-700 text-white p-4 shadow-lg flex justify-between items-center">
        <div class="text-3xl font-bold tracking-tighter">TL BANK</div>
        <div class="flex items-center space-x-4">
            <span v-if="user.name" class="font-medium">歡迎，{{ user.name }}</span>
            <button v-if="user.name" @click="logout" class="bg-sky-800 hover:bg-sky-900 px-4 py-1 rounded text-sm">登出</button>
            <div v-else class="space-x-2">
                <a href="login.html" class="hover:underline">登入</a>
                <a href="addMember.html" class="hover:underline">註冊</a>
            </div>
        </div>
    </nav>

    <header class="bg-white border-b p-8 text-center">
        <h1 class="text-4xl font-extrabold text-sky-900 mb-2">TL 心情小站 / 金融服務</h1>
        <p class="text-gray-500">提供最穩定的 Java 後端技術支援</p>
    </header>

    <main class="max-w-6xl mx-auto p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div v-for="item in menuItems" :key="item.title" 
             @click="checkLoginGo(item.url)"
             class="bg-white p-6 rounded-xl shadow-sm border hover:shadow-md transition cursor-pointer text-center group">
            <div class="text-sky-600 text-4xl mb-4 group-hover:scale-110 transition">
                <i :class="item.icon"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800">{{ item.title }}</h3>
            <p class="text-sm text-gray-500 mt-2">{{ item.desc }}</p>
        </div>
    </main>
</div>

<script>
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                user: { name: sessionStorage.getItem("userName") || "" },
                menuItems: [
                    { title: "我的帳戶", desc: "查看會員個人資料", url: "memberList.html", icon: "fa-solid fa-user-shield" },
                    { title: "產品瀏覽", desc: "精確的 BigDecimal 運算", url: "productList.html", icon: "fa-solid fa-money-bill-transfer" },
                    { title: "購物車", desc: "您的專屬交易清單", url: "orderList.html", icon: "fa-solid fa-cart-shopping" }
                ]
            }
        },
        methods: {
            checkLoginGo(target) {
                if (this.user.name) {
                    window.location.href = target;
                } else {
                    alert("請先登入，才可查看功能！");
                    window.location.href = "login.html";
                }
            },
            logout() {
                if (confirm("確定要登出嗎？")) {
                    // 這裡可以呼叫你的 /api/members/logout
                    sessionStorage.clear();
                    location.reload();
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
