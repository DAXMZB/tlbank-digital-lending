<!DOCTYPE html>
<html>

<!-- user-info -->
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- 入 Vue 3 以及 Tailwind CSS -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="/js/axios-config.js"></script>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body >
	<style>
		[v-cloak]{ display: none;}
	</style>
<!-- 當瀏覽器載入 JavaScript 較慢時，Vue 還沒完全接管網頁，使用者可能會在畫面上短暫看到像 {{ user.name }} 這樣的 Mustache 標籤（原始碼 -->
<!-- v-cloak 會留在 HTML 元素上，直到關聯的 Vue 實體編譯完成並掛載成功後，Vue 會自動移除這個屬性。 -->
<!-- 在 #app 加上 v-cloak 指令，並在 <head> 加入簡單的 CSS。 -->
	<div id="app" v-cloak>
		<!-- 主頁面引入js -->
		<tl-navbar :user-name="user.name" @on-logout="logout"></tl-navbar>

		<header class="bg-white border-b p-8 text-center">
			<h1 class="text-4xl font-extrabold text-sky-900 mb-2">TL 心情小站 /
				金融服務</h1>
			<p class="text-gray-500">提供最穩定的 Java 後端技術支援</p>
		</header>

		<main
			class="max-w-6xl mx-auto p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
			<div v-for="item in menuItems" :key="item.title"
				@click="checkLoginGo(item.url)"
				class="bg-white p-6 rounded-xl shadow-sm border hover:shadow-md transition cursor-pointer text-center group">
				<div
					class="text-sky-600 text-4xl mb-4 group-hover:scale-110 transition">
					<i :class="item.icon"></i>
				</div>
				<h3 class="text-xl font-bold text-gray-800">{{ item.title }}</h3>
				<p class="text-sm text-gray-500 mt-2">{{ item.desc }}</p>
			</div>
		</main>
	</div>

	<script type="module">
	import TLNavbar from '/js/TLNavbar.js';
    const { createApp } = Vue;

    createApp({
		components:{ 'tl-navbar': TLNavbar}, //註冊組件
        data() {
            return {
                user: { name: sessionStorage.getItem("userName") || "" },
                menuItems: [
                    { title: "我的帳戶", desc: "查看會員個人資料", url: "memberList.html", icon: "fa-solid fa-user-shield" },
                    { title: "產品瀏覽", desc: "精確的 BigDecimal 運算", url: "productList.html", icon: "fa-solid fa-money-bill-transfer" },
                    { title: "購物車", desc: "您的專屬交易清單", url: "orderList.html", icon: "fa-solid fa-cart-shopping" },
					{ title: "留言板", desc: "分享您的金融心得", url: "commentBoard.html", icon: "fa-solid fa-comments"}
                ]
            }
        },
		// 主動出擊詢問後端
		async mounted(){
			try {
				// 發送請求到 /info，如果伺服器重啟過，會回傳401
				await axios.get('/api/members/info');
			} catch (error) {
				// 如果報 401 ， axois-config.js 攔截器會自動彈窗並跳轉到 login.html
				console.error("Session 已失效", error);
			}
		},
        methods: {
            checkLoginGo(target) {
                if (this.user.name) {
                    window.location.href = target;
                } else {
                    alert("請先登入，才可查看功能！");
                    window.location.href = "login.html";
                }
            },
            async logout() {
                if (confirm("確定要登出嗎？")) {
                    try {
						await fetch('/api/members/logout', { method: 'POST' });							
						} catch (error){
						console.error("後端登出失敗，執行前端強制清理");
					} finally{
						sessionStorage.clear();
						location.href ="login.html";
					}
                    
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
