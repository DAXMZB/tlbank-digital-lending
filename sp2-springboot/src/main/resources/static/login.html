<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TL BANK - 安全登入</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">
    <div id="app" class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-sky-700">TL BANK</h1>
                <p class="text-slate-500 mt-2">請輸入您的帳號密碼以進行驗證</p>
            </div>

            <form @submit.prevent="handleLogin" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">帳號</label>
                    <input type="text" v-model="formData.username" placeholder="請輸入 8 位英數帳號"
                           class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">密碼</label>
                    <input type="password" v-model="formData.password" placeholder="請輸入您的密碼"
                           class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-sky-500 focus:outline-none transition">
                </div>

                <button type="submit" :disabled="loading"
                        class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-sky-200 transition disabled:bg-slate-400">
                    <span v-if="loading">驗證中...</span>
                    <span v-else>立即登入</span>
                </button>
            </form>

            <div class="mt-6 flex justify-between text-sm">
                <a href="javascript:void(0)" @click="forgotPassword" class="text-sky-600 hover:underline">忘記密碼？</a>
                <a href="addMember.html" class="text-slate-500 hover:text-sky-600">尚未註冊帳號？</a>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    formData: {
                        username: '',
                        password: ''
                    },
                    loading: false
                }
            },
            methods: {
                async handleLogin() {
                    if (!this.formData.username || !this.formData.password) {
                        alert("請填寫完整帳號與密碼");
                        return;
                    }

                    this.loading = true;
                    try {
                        // 使用 Axios 發送 POST 請求
                        const response = await axios.post('/api/members/login', this.formData);
                        const member = response.data;

                        // 1. 儲存至 sessionStorage
                        sessionStorage.setItem("userName", member.name);
                        sessionStorage.setItem("memberNo", member.memberNo);

                        // 2. 執行跳轉
                        window.location.href = "index.html";
                    } catch (error) {
                        // 處理 401 或其他驗證錯誤
                        const errorMsg = error.response ? error.response.data : "連線失敗";
                        alert(errorMsg);
                    } finally {
                        this.loading = false;
                    }
                },
                forgotPassword() {
                    const username = prompt("請輸入您的帳號：");
                    const email = prompt("請輸入您的註冊信箱：");

                    if (username && email) {
                        // 轉換為 URLSearchParams 格式以符合後端 @RequestParam 接收
                        const params = new URLSearchParams();
                        params.append('username', username);
                        params.append('email', email);

                        axios.post('/api/members/forgot-password', params)
                            .then(res => alert(res.data))
                            .catch(err => alert("錯誤：" + (err.response ? err.response.data : "請求失敗")));
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
