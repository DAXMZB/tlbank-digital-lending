<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body bgcolor="#faebd7">
	<table width=600 align=center border=1>
		<tr height=100>
			<td id="title-placeholder" colspan="2" bgcolor="black"
				style="opacity: 0.5" align=center></td>
			<!-- 首頁檔案 -->
			<!-- <script>
				$(function() {
					//put title.html in placeholder
					
				});
			</script> -->
		</tr>
		<tr>
			<td colspan=2 align="center"><h3>新增會員資料</h3></td>
		</tr>

		<tr>
			<td>帳號</td>
			<td><input type="text" name="username"> <input
				type="button" id="checkUsername" value="驗證帳號"></td>

		</tr>
		<tr>
			<td>密碼</td>
			<!-- 留意檢視密碼可行性 -->
			<td><input type="password" name="password"></td>
		</tr>
		<tr>
			<td>姓名</td>
			<td><input type="text" name="name"></td>
		</tr>
		<tr>
			<td>地址</td>
			<td><input type="text" name="address"></td>
		</tr>
		<tr>
			<td>電話</td>
			<td><input type="text" name="phone"></td>
		</tr>
		<tr>
			<td>手機</td>
			<td><input type="text" name="mobile"></td>
		</tr>
		<tr>
			<td>Email</td>
			<td><input type="email" name="email" placeholder="用於重設密碼">
				<input type="button" id="sendCodeBtn" value="獲取驗證碼"></td>
		</tr>
		<tr id="codeRow">
			<td>驗證碼</td>
			<td><input type="text" name="verifyCode" id="verifyCode" placeholder="請輸入 6 位驗證碼"></td>
		</tr>
		<tr>
			<td colspan=2 align=center><input type="button" id="addForm"
				value="ok"></td>
		</tr>



		<script>
			$(function() {
				$("#title-placeholder").load("title.html");
				//檢查帳號是否重複
				$("#checkUsername").click(function() {
					let username = $("input[name='username']").val();
					if (!username) {
						alert("請先輸入帳號");
						return;
					}//檢查，避免空值

					$.ajax({
						url : "/api/members/check",
						type : "GET",
						data : {
							username : username
						},//傳送參數
						success : function(response) {
							alert(response);//彈出此帳號可以使用
						},
						error : function(xhr) {
							alert(xhr.responseText);//彈出帳號已存在
						}
					});
				});
				$
				//新增帳號
				$("#addForm").click(function(e) {
					e.preventDefault(); //防止跳轉
					
					
					
					let memberData = {
						username : $("input[name='username']").val(),
						password : $("input[name='password']").val(),
						name : $("input[name='name']").val(),
						address : $("input[name='address']").val(),
						phone : $("input[name='phone']").val(),
						mobile : $("input[name='mobile']").val(),
						email : $("input[name='email']").val(),
						vertiyCode: $("#vertifyCode").val() // 獲取驗證碼
					};
					// 在傳送前先在 Console 檢查資料，這是 ICT 除錯的最佳實踐
					// console.log("確認傳送資料：", memberData);

					$.ajax({
						url : "/api/members/register",
						type : "POST",
						contentType : "application/json",
						data : JSON.stringify(memberData),
						success : function(response) {
							alert(response);
							window.location.href = "login.html";
						},
						error : function(xhr) {
							alert(xhr.responseText);// 預設優先捕捉Controleer @valid 即全域變數
													// 捕捉驗證碼錯誤或帳號重複訊息
							//window.location.href = "addMember.html"; 
							// 失敗時不跳轉，讓使用者修正
						}
					});
				});
				
				// 發送驗證碼事件
				$("#sendCodeBtn").click(function(){
					let btn = $(this);
					let email = $("input[name='email']").val();
					if(!email){
						alert("請先輸入 Email");
						return;
					}
					
					$.post("/api/members/send-code",{email: email}, function(res){
						alert(res);
						// 啟動倒數計時
						let seconds = 60;
						btn.prop("disabled", true);
						let timer = setInterval(function(){
							seconds--;
							btn.val(seconds + "s 後可重新獲取");
							if(seconds <= 0){
								clearInterval(timer);
								btn.prop("disabled", false).val("獲取驗證碼");
							}
						},1000); // 1000 毫秒即 1 秒執行一次扣秒
					}).fail(function(xhr){
						alert("錯誤：" + xhr.responseText);
					});
				});
				
				
			});
		</script>
	</table>

</body>
</html>
