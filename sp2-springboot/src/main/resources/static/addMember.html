<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TL BANK - 會員註冊</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<style>
[v-cloak] {
	display: none;
}
</style>
</head>
<body class="bg-slate-50 min-h-screen">
	<div id="app" v-cloak>
		<tl-navbar :user-name="user.name" @on-logout="logout"></tl-navbar>

		<main class="max-w-2xl mx-auto px-4 mt-12 pb-24">
			<div
				class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
				<div class="bg-sky-800 p-6 text-white text-center">
					<h2 class="text-2xl font-bold">{{
						uiMsgs['member-register-title'] }}</h2>
				</div>

				<form @submit.prevent="registerMember" class="p-8 space-y-5">
					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1">{{
							uiMsgs['member-label-username'] }}</label>
						<div class="flex space-x-2">
							<input type="text" v-model="form.username"
								class="flex-grow border rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-500 outline-none">
							<button type="button" @click="checkUsername"
								class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition">
								{{ uiMsgs['member-btn-check'] }}</button>
						</div>
					</div>

					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1">{{
							uiMsgs['member-label-password'] }}</label> <input type="password"
							v-model="form.password"
							class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-500 outline-none">
					</div>

					<div class="grid grid-cols-2 gap-4">
						<div>
							<label class="block text-sm font-semibold text-slate-700 mb-1">姓名</label>
							<input type="text" v-model="form.name"
								class="w-full border rounded-lg px-4 py-2">
						</div>
						<div>
							<label class="block text-sm font-semibold text-slate-700 mb-1">市話</label>
							<input type="tel" v-model="form.phone" maxlength="8"
								@input="form.phone = form.phone.replace(/[^\d]/g,'')"
								class="w-full border rounded-lg px-4 py-2" placeholder="8位數字">
						</div>
					</div>

					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1">手機號碼</label>
						<input type="tel" v-model="form.mobile" maxlength="10"
							@input="form.mobile = form.mobile.replace(/[^\d]/g,'')"
							class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-sky-500 outline-none"
							placeholder="0912345678">
					</div>

					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1">地址</label>
						<input type="text" v-model="form.address"
							class="w-full border rounded-lg px-4 py-2">
					</div>

					<div>
						<label class="block text-sm font-semibold text-slate-700 mb-1">{{
							uiMsgs['member-label-email'] }}</label>
						<div class="flex space-x-2">
							<input type="email" v-model="form.email"
								class="flex-grow border rounded-lg px-4 py-2">
							<button type="button" @click="sendCode" :disabled="countdown > 0"
								class="bg-sky-100 hover:bg-sky-200 text-sky-700 px-4 py-2 rounded-lg text-sm font-medium transition disabled:opacity-50">
								{{ codeBtnText }}</button>
						</div>
					</div>

					<div v-if="codeSent">
						<label class="block text-sm font-semibold text-emerald-700 mb-1">請輸入
							6 位驗證碼</label> <input type="text" v-model="form.vertifyCode"
							maxlength="6"
							class="w-full border-2 border-emerald-500 rounded-lg px-4 py-2 outline-none">
					</div>

					<div class="pt-4">
						<button type="submit"
							class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95">
							{{ uiMsgs['member-btn-submit'] }}</button>

					</div>
				</form>
				
			</div>
		</main>
	</div>

	<script type="module">
        import TLNavbar from '/js/TLNavbar.js';
        const { createApp } = Vue;

        createApp({
            components: { 'tl-navbar': TLNavbar },
            data() {
                return {
                    user: { name: sessionStorage.getItem("userName") || "" },
                    form: { username: '', password: '', name: '', address: '', phone: '', mobile: '', email: '', vertifyCode: '' },
                    uiMsgs: {},
                    countdown: 0,
                    codeSent: false
                }
            },
            computed: {
                // ✅ 動態按鈕文字處理
                codeBtnText() {
                    if (this.countdown > 0) {
                        return this.uiMsgs['member-label-retry-code']?.replace('%s', this.countdown) || `${this.countdown}s`;
                    }
                    return this.uiMsgs['member-label-send-code'] || '獲取驗證碼';
                }
            },
            async mounted() {
                // ✅ 批次獲取註冊頁面所需的 Key
                const keys = "member-register-title,member-msg-input-username,member-msg-input-email,member-label-send-code,member-label-retry-code,member-label-username,member-placeholder-username,member-label-password,member-label-email,member-btn-check,member-btn-submit,member-error-generic-fail";
                try {
                    const res = await axios.get('/api/messages/batch', { params: { keys } });
                    this.uiMsgs = res.data;
                } catch (e) {
                    console.error("載入資源失敗", e);
                }
            },
            methods: {
                async checkUsername() {
                    
                    try {
                        const res = await axios.get('/api/members/check', { params: { username: this.form.username } });
                        const message = res.data.data || res.data;
						alert(message);
                    } catch (e) {
						const errorData = e.response?.data;

						if (errorData && typeof errorData == 'object') {
							alert("檢查失敗：" + (errorData.message || JSON.stringify(errorData)));
						}else {
							// 如果是純字串
							alert(errorData || "檢查失敗");
						}                      
                    }
                },
                async sendCode() {
                    

					// UI 先行，按下立即冷卻
					this.countdown = 60; // 立即設定秒數，讓 codeBtnText 觸發反灰
					this.startTimer(); // 立即啟動計時
					this.codeSent = true;
                    try {
						// 現在才發送網路請求
                        const res = await axios.post(`/api/members/send-code?email=${this.form.email}`);
                        alert(res.data.data);
                    } catch (e) {
						let errorMsg = "發送失敗";
						if (e.response && e.response.data) {
							const errData = e.response.data;
							// 判斷是否為 ApiResponse 封裝物件
							if (typeof errData === 'object') {
								errorMsg = errData.message || errData.data || JSON.stringify(errData);
							}else {
								// 如果後端直接回傳純字串
                				errorMsg = errData;
							}
						}
						
						// 如果失敗，則重置計時器讓使用者可已重試
						this.countdown = 0;

						alert("錯誤：" + errorMsg);
                        
                    }
                },
                startTimer() {
                    
                    const timer = setInterval(() => {
                        this.countdown--;
                        if (this.countdown <= 0) clearInterval(timer);
                    }, 1000);
                },
                async registerMember() {
                    try {
                        // ✅ 送出註冊資料，回傳文字來自 MessageService 撈取的「註冊成功」
                        const res = await axios.post('/api/members/register', this.form);
                        alert(res.data.data);
                        location.href = "login.html";
                    } catch (e) {
						let errorMsg = "註冊失敗";
        
        				if (e.response && e.response.data) {
            				const data = e.response.data;
            				// ✅ 判斷回傳的是不是物件 (例如 Spring Validation 的錯誤結果)
            				if (typeof data === 'object') {
                				// 如果是物件，取其第一個錯誤訊息，或轉為字串顯示
                				errorMsg = data.message || JSON.stringify(data);
            				} else {
                				// 如果是純字串 (例如 Service 拋出的 MemberException)
                				errorMsg = data;
            						}
        					}
        
        					alert(errorMsg);
                    }
					
                },
                logout() { sessionStorage.clear(); location.href = "login.html"; }
            }
        }).mount('#app');
    </script>
</body>
</html>
