<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TL BANK - 會員管理系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app">
        <nav class="bg-sky-800 text-white p-4 shadow-md flex justify-between items-center mb-8">
            <div class="text-xl font-bold tracking-tight">TL BANK ADMIN</div>
            <button @click="goHome" class="text-sm bg-sky-700 hover:bg-sky-600 px-4 py-2 rounded transition">回首頁</button>
        </nav>

        <main class="max-w-6xl mx-auto px-4">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-slate-800">所有會員名單</h2>
                    <span class="text-sm text-slate-500">每頁顯示 {{ pageSize }} 筆</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-600 text-sm uppercase">
                            <tr>
                                <th class="px-6 py-4 font-semibold">ID</th>
                                <th class="px-6 py-4 font-semibold">帳號</th>
                                <th class="px-6 py-4 font-semibold">姓名</th>
                                <th class="px-6 py-4 font-semibold">電話</th>
                                <th class="px-6 py-4 font-semibold">地址</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-slate-700">
                            <tr v-for="m in members" :key="m.memberNo" class="hover:bg-sky-50 transition">
                                <td class="px-6 py-4 font-medium text-sky-700">#{{ m.memberNo }}</td>
                                <td class="px-6 py-4">{{ m.username }}</td>
                                <td class="px-6 py-4 font-semibold">{{ m.name }}</td>
                                <td class="px-6 py-4 text-slate-500">{{ m.phone }}</td>
                                <td class="px-6 py-4 text-sm">{{ m.address }}</td>
                            </tr>
                            <tr v-if="members.length === 0 && !loading">
                                <td colspan="5" class="px-6 py-12 text-center text-slate-400">目前尚無會員資料</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="p-6 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                    <div class="text-sm text-slate-600">
                        第 <span class="font-bold text-sky-700">{{ pageInfo.number + 1 }}</span> 頁 / 
                        共 <span class="font-bold">{{ pageInfo.totalPages }}</span> 頁
                    </div>
                    <div class="space-x-2">
                        <button @click="changePage(-1)" :disabled="pageInfo.first || loading"
                                class="px-4 py-2 bg-white border border-slate-300 rounded-md text-sm font-medium hover:bg-slate-50 disabled:opacity-50 transition">
                            上一頁
                        </button>
                        <button @click="changePage(1)" :disabled="pageInfo.last || loading"
                                class="px-4 py-2 bg-sky-600 text-white rounded-md text-sm font-medium hover:bg-sky-700 disabled:opacity-50 transition">
                            下一頁
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    members: [],
                    pageInfo: { number: 0, totalPages: 0, first: true, last: true },
                    pageSize: 5,
                    loading: false
                }
            },
            mounted() {
                // 初始化載入第一頁
                this.loadMembers(0);
            },
            methods: {
                async loadMembers(page) {
                    this.loading = true;
                    try {
                        const response = await axios.get('/api/members/list', {
                            params: { page: page, size: this.pageSize }
                        });
                        
                        // Spring Data JPA 的資料結構：content 為清單，page 為分頁資訊
                        this.members = response.data.content;
                        this.pageInfo = response.data.page;
                    } catch (error) {
                        // 處理 401 或其他加載錯誤
                        alert("載入會員清單失敗，請確認是否已登入");
                        if (error.response && error.response.status === 401) {
                            window.location.href = "login.html";
                        }
                    } finally {
                        this.loading = false;
                    }
                },
                changePage(delta) {
                    const nextPage = this.pageInfo.number + delta;
                    this.loadMembers(nextPage);
                },
                goHome() {
                    window.location.href = "index.html";
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
