<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TL BANK - 咖啡與點心專區</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app">
        <nav class="bg-sky-800 text-white p-4 shadow-md flex justify-between items-center mb-6">
            <div class="text-xl font-bold">TL BANK SHOP</div>
            <button @click="goHome" class="bg-sky-700 hover:bg-sky-600 px-4 py-2 rounded text-sm transition">回首頁</button>
        </nav>

        <main class="max-w-6xl mx-auto px-4 pb-12">
            <h2 class="text-3xl font-extrabold text-slate-800 text-center mb-8">精選咖啡與點心</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                <div v-for="p in products" :key="p.id" 
                     class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col hover:shadow-md transition">
                    <h4 class="text-xl font-bold text-slate-800 mb-2">{{ p.productName }}</h4>
                    <p class="text-slate-500 text-sm flex-grow mb-4">{{ p.description }}</p>
                    <div class="flex justify-between items-end mb-4">
                        <span class="text-2xl font-black text-sky-700">NT$ {{ p.price }}</span>
                        <span class="text-xs text-slate-400">庫存: {{ p.stock }}</span>
                    </div>
                    
                    <div class="flex items-center space-x-2 mb-4">
                        <label class="text-sm text-slate-600">數量：</label>
                        <select v-model.number="p.selectedQty" class="border rounded px-2 py-1 flex-grow">
                            <option v-for="n in 5" :key="n" :value="n">{{ n }}</option>
                        </select>
                    </div>
                    
                    <button @click="addToCart(p)" 
                            class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-2 rounded-lg transition">
                        加入購物車
                    </button>
                </div>
            </div>

            <div class="flex justify-center items-center space-x-4 mb-12">
                <button @click="changePage(-1)" :disabled="pageInfo.first" class="px-4 py-2 border rounded bg-white disabled:opacity-50">上一頁</button>
                <span class="text-slate-600">第 {{ pageInfo.number + 1 }} 頁 / 共 {{ pageInfo.totalPages }} 頁</span>
                <button @click="changePage(1)" :disabled="pageInfo.last" class="px-4 py-2 border rounded bg-white disabled:opacity-50">下一頁</button>
            </div>

            <section v-if="cart.length > 0" class="bg-white rounded-2xl shadow-lg border-2 border-emerald-500 p-8">
                <h3 class="text-2xl font-bold text-emerald-700 mb-6 flex items-center">
                    <span class="mr-2">🛒</span> 結算清單
                </h3>
                <table class="w-full text-left mb-6">
                    <thead class="border-b text-slate-400 text-sm">
                        <tr>
                            <th class="py-2">商品</th>
                            <th class="py-2">單價</th>
                            <th class="py-2 text-center">數量</th>
                            <th class="py-2 text-right">小計</th>
                            <th class="py-2 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        <tr v-for="(item, index) in cart" :key="item.id">
                            <td class="py-4 font-bold text-slate-700">{{ item.name }}</td>
                            <td class="py-4 text-slate-500">NT$ {{ item.price }}</td>
                            <td class="py-4 text-center">{{ item.qty }}</td>
                            <td class="py-4 text-right font-bold text-sky-700">NT$ {{ item.price * item.qty }}</td>
                            <td class="py-4 text-center">
                                <button @click="removeFromCart(index)" class="text-red-500 hover:text-red-700 font-medium">刪除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="flex justify-between items-center border-t pt-6">
                    <div class="text-3xl font-black text-slate-800">總計：<span class="text-emerald-600">NT$ {{ grandTotal }}</span></div>
                    <button @click="checkout" :disabled="checkoutLoading"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-3 rounded-xl font-bold text-lg shadow-lg transition disabled:bg-slate-300">
                        {{ checkoutLoading ? '結帳處理中...' : '確認結帳' }}
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    products: [],
                    cart: [],
                    pageInfo: { number: 0, totalPages: 0, first: true, last: true },
                    pageSize: 6,
                    checkoutLoading: false
                }
            },
            computed: {
                // 自動計算總額
                grandTotal() {
                    return this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                }
            },
            mounted() {
                this.loadProducts(0);
            },
            methods: {
                async loadProducts(page) {
                    try {
                        const response = await axios.get('/api/products/list', {
                            params: { page: page, size: this.pageSize }
                        });
                        // 初始化每個商品的選中數量為 1
                        this.products = response.data.content.map(p => ({...p, selectedQty: 1}));
                        this.pageInfo = response.data.page;
                    } catch (error) {
                        console.error("載入商品失敗", error);
                    }
                },
                changePage(delta) {
                    this.loadProducts(this.pageInfo.number + delta);
                },
                addToCart(product) {
                    const exist = this.cart.find(item => item.id === product.id);
                    if (exist) {
                        exist.qty += product.selectedQty;
                    } else {
                        this.cart.push({
                            id: product.id,
                            name: product.productName,
                            price: product.price,
                            qty: product.selectedQty
                        });
                    }
                },
                removeFromCart(index) {
                    this.cart.splice(index, 1);
                },
                async checkout() {
                    const memberNo = sessionStorage.getItem("memberNo");
                    if (!memberNo) { alert("請先登入"); window.location.href = "login.html"; return; }
                    if (this.cart.length === 0) return;

                    if (confirm(`確定送出？總金額為：NT$ ${this.grandTotal}`)) {
                        this.checkoutLoading = true;
                        try {
                            const postData = this.cart.map(item => ({
                                productId: item.id,
                                quantity: item.qty
                            }));
                            const response = await axios.post(`/api/orders/createBatch?memberId=${memberNo}`, postData);
                            alert(`結算成功！\n訂單編號：${response.data.orderNo}\n總金額：NT$ ${response.data.totalAmount}`);
                            this.cart = [];
                        } catch (error) {
                            alert("結算失敗：" + (error.response ? error.response.data : "伺服器錯誤"));
                        } finally {
                            this.checkoutLoading = false;
                        }
                    }
                },
                goHome() { window.location.href = "index.html"; }
            }
        }).mount('#app');
    </script>
</body>
</html>
