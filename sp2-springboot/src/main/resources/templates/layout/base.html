<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">TLBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --tl-sky-900: #0c4a6e;
            --tl-sky-700: #0369a1;
            --tl-sky-600: #0284c7;
            --tl-sky-100: #e0f2fe;
            --tl-sky-50: #f0f9ff;
        }
        body { background-color: var(--tl-sky-50); color: var(--tl-sky-900); }
        .navbar-tl { background: linear-gradient(90deg, var(--tl-sky-900), var(--tl-sky-700)); }
        .navbar-tl .navbar-brand, .navbar-tl .nav-link { color: #fff !important; }
        .navbar-tl .nav-link:hover { color: var(--tl-sky-100) !important; }
        .navbar-tl .welcome-text { color: var(--tl-sky-100) !important; font-size: 0.95rem; }
        .navbar-tl .btn-logout {
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 0.5rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.9rem;
        }
        .navbar-tl .btn-logout:hover {
            background-color: rgba(255, 255, 255, 0.12);
            color: #fff !important;
        }
        .card-tl { border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 8px 24px rgba(2, 132, 199, 0.08); }
        .btn-tl-primary { background-color: var(--tl-sky-600); border-color: var(--tl-sky-600); color: #fff; }
        .btn-tl-primary:hover { background-color: var(--tl-sky-700); border-color: var(--tl-sky-700); color: #fff; }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-tl mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">TLBank Digital Lending</a>
        <div class="navbar-nav ms-auto align-items-center gap-1">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/products">Apply for Card</a>
            <a class="nav-link" href="/admin/users" sec:authorize="hasRole('ADMIN')">User Management</a>
            <a class="nav-link" href="/admin/system-parameters" sec:authorize="hasRole('ADMIN')">System Parameters</a>
            <a class="nav-link" href="/admin/audit-logs" sec:authorize="hasRole('ADMIN')">Audit Logs</a>
            <a class="nav-link" href="/admin/notifications" sec:authorize="hasRole('ADMIN')">Notifications</a>
            <a class="nav-link" href="/admin/reports" sec:authorize="hasRole('ADMIN')">Reports</a>
            <a class="nav-link" href="/review/cases" sec:authorize="hasAnyRole('REVIEWER','ADMIN')">Card Review</a>
            <span class="nav-link welcome-text px-2" sec:authorize="isAuthenticated() and !isAnonymous()">
                Welcome, <strong sec:authentication="principal.fullName">User</strong>
            </span>
            <a class="nav-link" href="/login" sec:authorize="isAnonymous()">Login</a>
            <form th:action="@{/api/v1/auth/logout}" method="post" class="d-inline ms-1"
                  sec:authorize="isAuthenticated() and !isAnonymous()">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
