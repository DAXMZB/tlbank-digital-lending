<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Audit Logs - TLBank')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container pb-5">
    <div class="mb-4">
        <h1 class="h3 fw-bold mb-1">Audit Logs</h1>
        <p class="text-muted mb-0">Search system operations and security event records</p>
    </div>

    <div class="card card-tl mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/admin/audit-logs}" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                           th:value="${username}" placeholder="Enter username keyword">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="action">Action Type</label>
                    <select class="form-select" id="action" name="action">
                        <option value="">All</option>
                        <option th:each="a : ${actions}"
                                th:value="${a}"
                                th:text="${a}"
                                th:selected="${action == a}">USER_LOGIN</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label" for="dateFrom">From Date</label>
                    <input type="date" class="form-control" id="dateFrom" name="dateFrom"
                           th:value="${dateFrom}">
                </div>
                <div class="col-md-2">
                    <label class="form-label" for="dateTo">To Date</label>
                    <input type="date" class="form-control" id="dateTo" name="dateTo"
                           th:value="${dateTo}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-tl-primary w-100">Search</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card card-tl">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Username</th>
                        <th>Action</th>
                        <th>IP</th>
                        <th>Result</th>
                        <th>Detail</th>
                        <th>Time</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${logs.content()}">
                        <td th:text="${log.username()}">admin</td>
                        <td>
                            <span class="badge text-bg-info" th:text="${log.action()}">USER_LOGIN</span>
                        </td>
                        <td th:text="${log.ipAddress() != null ? log.ipAddress() : '-'}">127.0.0.1</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${log.result() == 'SUCCESS'} ? ' text-bg-success' : ' text-bg-danger'"
                                  th:text="${log.result()}">SUCCESS</span>
                        </td>
                        <td class="small" th:text="${log.detail() != null ? log.detail() : '-'}">detail</td>
                        <td th:text="${log.createdAt() != null ? #temporals.format(log.createdAt(), 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                    </tr>
                    <tr th:if="${logs.content().isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">No matching records found</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center" th:if="${logs.totalPages() > 1}">
            <span class="text-muted small"
                  th:text="'Total ' + ${logs.totalElements()} + ' records, page ' + (${logs.page()} + 1) + ' / ' + ${logs.totalPages()}">
                Total 0 records
            </span>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${logs.page() == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/audit-logs(page=${logs.page() - 1}, size=${logs.size()}, username=${username}, action=${action}, dateFrom=${dateFrom}, dateTo=${dateTo})}">Previous</a>
                    </li>
                    <li class="page-item" th:classappend="${logs.page() + 1 >= logs.totalPages()} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/audit-logs(page=${logs.page() + 1}, size=${logs.size()}, username=${username}, action=${action}, dateFrom=${dateFrom}, dateTo=${dateTo})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
