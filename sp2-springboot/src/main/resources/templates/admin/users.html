<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('User Management - TLBank')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">User Management</h1>
            <p class="text-muted mb-0">Manage system accounts, roles, and activation status</p>
        </div>
        <button class="btn btn-tl-primary" data-bs-toggle="modal" data-bs-target="#createUserModal">
            Create User
        </button>
    </div>

    <div class="card card-tl">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Roles</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.username()}">admin</td>
                        <td th:text="${user.fullName()}">System Admin</td>
                        <td th:text="${user.email()}">admin@tlbank.local</td>
                        <td>
                            <span th:each="role : ${user.roles()}"
                                  class="badge text-bg-info me-1"
                                  th:text="${role}">ROLE_ADMIN</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${user.enabled()} ? ' text-bg-success' : ' text-bg-secondary'"
                                  th:text="${user.enabled()} ? 'Active' : 'Disabled'">Active</span>
                        </td>
                        <td th:text="${user.lastLoginAt() != null ? #temporals.format(user.lastLoginAt(), 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                        <td class="text-end">
                            <button class="btn btn-sm"
                                    th:classappend="${user.enabled()} ? 'btn-outline-danger' : 'btn-outline-success'"
                                    th:text="${user.enabled()} ? 'Disable' : 'Enable'"
                                    th:attr="data-user-id=${user.userId()}, data-enabled=${!user.enabled()}"
                                    onclick="updateUserStatus(this)">
                                Disable
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Create User Modal -->
<div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="createUserModalLabel">Create User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="createUserForm">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" class="form-control" id="password" minlength="8" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="roles">Roles</label>
                        <select class="form-select" id="roles" multiple>
                            <option value="ROLE_USER" selected>ROLE_USER</option>
                            <option value="ROLE_REVIEWER">ROLE_REVIEWER</option>
                            <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                        </select>
                        <div class="form-text">Defaults to ROLE_USER; multiple selections allowed</div>
                    </div>
                </form>
                <div id="createUserError" class="alert alert-danger d-none" role="alert"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-tl-primary" onclick="createUser()">Create</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function updateUserStatus(button) {
        const userId = button.dataset.userId;
        const enabled = button.dataset.enabled === 'true';
        const response = await fetch(`/api/v1/admin/users/${userId}/status?enabled=${enabled}`, {
            method: 'PUT',
            credentials: 'same-origin'
        });
        if (response.ok) {
            location.reload();
        } else {
            alert('Failed to update status');
        }
    }

    async function createUser() {
        const rolesSelect = document.getElementById('roles');
        const selectedRoles = Array.from(rolesSelect.selectedOptions).map(option => option.value);
        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            roles: selectedRoles.length > 0 ? selectedRoles : ['ROLE_USER']
        };

        const response = await fetch('/api/v1/admin/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            location.reload();
            return;
        }

        const result = await response.json();
        const errorBox = document.getElementById('createUserError');
        errorBox.textContent = result.message || 'Failed to create user';
        errorBox.classList.remove('d-none');
    }
</script>
</body>
</html>
