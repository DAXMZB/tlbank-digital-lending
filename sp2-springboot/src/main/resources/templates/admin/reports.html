<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Reports - TLBank')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container pb-5">
    <div class="mb-4">
        <h1 class="h3 fw-bold mb-1">Daily Application Statistics Report</h1>
        <p class="text-muted mb-0">Select a date and format to generate and download the daily credit card application report</p>
    </div>

    <div class="card card-tl">
        <div class="card-body">
            <form id="reportForm" class="row g-4">
                <div class="col-md-4">
                    <label class="form-label" for="reportDate">Report Date</label>
                    <input type="date" class="form-control" id="reportDate" name="reportDate" required
                           th:value="${defaultReportDate}">
                </div>

                <div class="col-md-8">
                    <label class="form-label">Export Format</label>
                    <div class="d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="format" id="formatExcel"
                                   value="EXCEL" checked>
                            <label class="form-check-label" for="formatExcel">Excel (.xlsx)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="format" id="formatPdf"
                                   value="PDF">
                            <label class="form-check-label" for="formatPdf">PDF (.pdf)</label>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-tl-primary" id="generateBtn">
                        Generate and Download Report
                    </button>
                    <span id="statusMessage" class="ms-3 text-muted small"></span>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('reportForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const reportDate = document.getElementById('reportDate').value;
        const format = document.querySelector('input[name="format"]:checked').value;
        const statusMessage = document.getElementById('statusMessage');
        const generateBtn = document.getElementById('generateBtn');

        statusMessage.textContent = 'Generating, please wait...';
        generateBtn.disabled = true;

        try {
            const response = await fetch('/api/v1/reports/daily-statistics', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reportDate, format })
            });

            if (!response.ok) {
                throw new Error('Failed to generate report');
            }

            const blob = await response.blob();
            const disposition = response.headers.get('Content-Disposition') || '';
            const fileNameMatch = disposition.match(/filename="(.+)"/);
            const fileName = fileNameMatch ? fileNameMatch[1] : ('daily-statistics.' + (format === 'EXCEL' ? 'xlsx' : 'pdf'));

            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            link.remove();
            window.URL.revokeObjectURL(url);

            statusMessage.textContent = 'Download complete';
        } catch (error) {
            statusMessage.textContent = error.message || 'Failed to generate report';
        } finally {
            generateBtn.disabled = false;
        }
    });
</script>
</body>
</html>
