<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Credit Card Products - TLBank')}"></head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>

<div class="container pb-5">
    <div class="mb-4">
        <h1 class="h3 fw-bold mb-1">Credit Card Products</h1>
        <p class="text-muted mb-0">Choose the card that fits you and start your application</p>
    </div>

    <div class="row g-4">
        <div class="col-md-6" th:each="product : ${products}">
            <div class="card card-tl h-100">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h2 class="h5 fw-bold mb-0" th:text="${product.productName()}">TL Classic Card</h2>
                        <span class="badge text-bg-info" th:text="${product.cardType()}">VISA</span>
                    </div>
                    <p class="text-muted small mb-3" th:text="${product.productCode()}">TL-CLASSIC</p>
                    <ul class="list-unstyled small mb-4 flex-grow-1">
                        <li th:each="feature : ${product.features()}" class="mb-1">
                            <strong th:text="${feature.featureKey()}">Cashback</strong>
                            <span th:if="${feature.featureValue() != null}"
                                  th:text="' - ' + ${feature.featureValue()}"> - 1% cashback</span>
                        </li>
                    </ul>
                    <a th:href="@{/apply(cardProductId=${product.productId()})}"
                       class="btn btn-tl-primary w-100">Apply</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info mt-4">
        No credit card products are currently available for application.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
