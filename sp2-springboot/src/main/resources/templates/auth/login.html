<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLBank - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --tl-sky-900: #0c4a6e;
            --tl-sky-700: #0369a1;
            --tl-sky-600: #0284c7;
            --tl-sky-100: #e0f2fe;
            --tl-sky-50: #f0f9ff;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, var(--tl-sky-50) 0%, #ffffff 45%, var(--tl-sky-100) 100%);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        .brand-title {
            color: var(--tl-sky-900);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand-subtitle {
            color: #64748b;
        }

        .login-card {
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.08);
        }

        .card-header-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--tl-sky-600), var(--tl-sky-700));
            border-radius: 1rem 1rem 0 0;
        }

        .form-label {
            color: var(--tl-sky-900);
            font-weight: 600;
        }

        .form-control:focus {
            border-color: var(--tl-sky-600);
            box-shadow: 0 0 0 0.2rem rgba(2, 132, 199, 0.15);
        }

        .btn-tl-primary {
            background-color: var(--tl-sky-600);
            border-color: var(--tl-sky-600);
            color: #fff;
            font-weight: 600;
        }

        .btn-tl-primary:hover {
            background-color: var(--tl-sky-700);
            border-color: var(--tl-sky-700);
            color: #fff;
        }

        .alert-login-error {
            background-color: #fef2f2;
            border-color: #fecaca;
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="text-center mb-4">
                    <h1 class="brand-title mb-2">TLBank Digital Lending</h1>
                    <p class="brand-subtitle mb-0">Credit Card Application Platform · Secure Login</p>
                </div>

                <div class="card login-card">
                    <div class="card-header-bar"></div>
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h4 brand-title mb-1">Welcome Back</h2>
                        <p class="text-muted mb-4">Please enter your username and password</p>

                        <div th:if="${param.error}" class="alert alert-login-error py-2" role="alert">
                            Invalid username or password. Please try again.
                        </div>

                        <form th:action="@{/api/v1/auth/login}" method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>

                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username"
                                       placeholder="Enter username" required autofocus>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Enter password" required>
                            </div>

                            <button type="submit" class="btn btn-tl-primary w-100 py-2">Login</button>
                        </form>
                    </div>
                </div>

                <p class="text-center text-muted small mt-4 mb-0">
                    &copy; TLBank · Enterprise Digital Lending Platform
                </p>
            </div>
        </div>
    </div>
</body>
</html>
