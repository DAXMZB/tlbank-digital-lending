name: TLBank CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      
      - name: Build and test with Maven
        run: mvn clean verify