# ==========================================
# 1. 全域設定與自動化觸發條件
# ==========================================
name: TLBank CI  # 工作流程（Workflow）的名稱 ( 顯示在 GitHub 的 Actions 頁面

on:
  push:
    branches: [ "main", "develop" ]  #  push 程式碼到 main 或 develop 分支時，觸發此流程
  pull_request:
    branches: [ "main", "develop" ]  # 對 main 或 develop 分支發起 PR（合併請求）時，觸發此流程

# ==========================================
# 2. 自動化任務清單（Jobs）
# ==========================================
jobs:

  # ----------------------------------------
  # 任務一：編譯與測試（ Core Job)
  # ----------------------------------------
  build-test:
    name: Build and Test              # 在 GitHub 畫面上顯示的任務名稱
    runs-on: ubuntu-latest            # 指定在 GitHub 提供的最新版 Linux (Ubuntu) 虛擬機環境下執行

    steps:
      - name: Checkout source code    # 步驟 1：複製/下載專案原始碼
        uses: actions/checkout@v4     # 使用官方的 checkout 套件，把 GitHub 上的程式碼拉到虛擬機中

      - name: Set up Java 17          # 步驟 2：在虛擬機中安裝並設定 Java 17 環境
        uses: actions/setup-java@v4
        with:
          distribution: temurin       # 指定採用 Eclipse Temurin 發行版的 JDK
          java-version: 17            # 指定 Java 版本為 17
          cache: maven                # 開啟 Maven 依賴套件快取，下次執行時免重複下載

      - name: Build and test with Maven # 步驟 3：使用 Maven 進行編譯與測試
        run: mvn clean verify         # clean 清除舊產物；verify 進行編譯、跑單元與整合測試並驗證專案

  # ----------------------------------------
  # 任務二：程式碼品質檢查（與任務一平行執行）
  # ----------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待 build-test 任務成功過關，此任務才會開始執行

    steps:
      - name: Checkout source code    # 步驟 1：同樣需要先下載原始碼
        uses: actions/checkout@v4

      - name: Set up Java 17          # 步驟 2：設定 Java 17 環境與快取
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Maven verification  # 步驟 3：執行 Maven 驗證
        run: mvn verify               

  # ----------------------------------------
  # 任務三：Docker 容器打包（與任務一平行執行）
  # ----------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待 build-test 任務成功過關，此任務才會開始執行

    steps:
      - name: Checkout source code    # 步驟 1：下載原始碼
        uses: actions/checkout@v4

      - name: Build Docker image      # 步驟 2：將專案打包成 Docker 鏡像（Image）
        run: docker build -t tlbank-backend:latest -f docker/app/Dockerfile .

  # ----------------------------------------
  # 任務四：第三方套件安全性掃描（與任務一平行執行）
  # ----------------------------------------
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-test                 # 必須等待 build-test 任務成功過關，此任務才會開始執行

    steps:
      - name: Checkout source code    # 步驟 1：下載原始碼
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan # 步驟 2：使用 Trivy 安全性掃描工具
        uses: aquasecurity/trivy-action@master # 引入開源資安漏洞掃描套件 Trivy
        with:
          scan-type: fs               # 掃描類型：fs 代表針對檔案系統（Filesystem）進行掃描
          scan-ref: .                 # 掃描路徑：. 代表掃描當前專案的根目錄
          severity: HIGH,CRITICAL     # 篩選等級：只抓出「高風險(HIGH)」與「緊急嚴重(CRITICAL)」的資安漏洞
          exit-code: 1                # 核心防線：只要發現上述等級的漏洞，強制回傳錯誤碼 1，直接中斷並讓 CI 宣告失敗