version: '3.8'
services:
  # 資料庫服務
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: Company
      MYSQL_ROOT_PASSWORD: POPPOPfull1
      MYSQL_PASSWORD: POPPOPfull1
    ports:
      - "3306:3306"

  # Java 應用程式服務
  app:
    build: .
    container_name: spring-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # 將資料庫連線位址改為 db (Docker 內部的服務名稱)
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/Company?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: POPPOPfull1