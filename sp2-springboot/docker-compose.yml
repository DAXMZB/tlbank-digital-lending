services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tlbank-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./docker/sqlserver/init:/scripts:ro
    networks:
      - tlbank-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tlbank-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
    volumes:
      - ./docker/sqlserver/init:/scripts:ro
    networks:
      - tlbank-network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -i /scripts/01-init-database.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -i /scripts/02-create-app-user.sql
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: tlbank-app
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-staging}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_SERVLET_SESSION_TIMEOUT: ${APP_SESSION_TIMEOUT:-30m}
      TLBANK_UPLOAD_BASE_PATH: ${APP_UPLOAD_PATH:-/app/uploads}
    ports:
      - "8080:8080"
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
    networks:
      - tlbank-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  sqlserver-data:
  app-uploads:
  app-logs:

networks:
  tlbank-network:
    driver: bridge
