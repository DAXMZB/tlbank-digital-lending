# ==========================================================================
# TLBank CD 部署唯一模板（GitHub Actions self-hosted 使用）
# 由 ci.yml 複製到 $HOME/tlbank/docker-compose.yml，勿在此寫入真實密碼
# ==========================================================================

services:

  # SQL Server：僅 amd64 官方映像；Apple Silicon 須明確指定平台
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: tlbank-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - tlbank-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 300s

  # 使用 repository 內初始化腳本建立 TLBankLending 與 tlbank_app（sa 僅用於初始化）
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: tlbank-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
      APP_DB_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - ./docker/sqlserver/init:/scripts:ro
    networks:
      - tlbank-network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail

        echo "[db-init] Checking initialization scripts..."
        test -f /scripts/01-init-database.sql
        test -f /scripts/02-create-app-user.sql

        echo "[db-init] Creating or verifying TLBankLending database..."
        /opt/mssql-tools18/bin/sqlcmd \
          -S sqlserver \
          -U sa \
          -P "$$MSSQL_SA_PASSWORD" \
          -C \
          -b \
          -r1 \
          -i /scripts/01-init-database.sql

        echo "[db-init] Verifying TLBankLending is ONLINE..."
        /opt/mssql-tools18/bin/sqlcmd \
          -S sqlserver \
          -U sa \
          -P "$$MSSQL_SA_PASSWORD" \
          -C \
          -b \
          -r1 \
          -Q "IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'TLBankLending' AND state_desc = N'ONLINE') THROW 51000, 'TLBankLending is not ONLINE.', 1;"

        echo "[db-init] Creating or updating tlbank_app login and database user..."
        /opt/mssql-tools18/bin/sqlcmd \
          -S sqlserver \
          -U sa \
          -P "$$MSSQL_SA_PASSWORD" \
          -C \
          -b \
          -r1 \
          -v AppPassword="$$APP_DB_PASSWORD" \
          -i /scripts/02-create-app-user.sql

        echo "[db-init] Database initialization completed successfully."
    restart: "no"

  # Redis：固定版本 + named volume；供冪等儲存使用
  redis:
    image: redis:7.4-alpine
    container_name: tlbank-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tlbank-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Spring Boot：使用 GHCR 映像（多架構時由 Docker 自動選臂）；不以 root 執行
  app:
    image: ${APP_IMAGE}
    container_name: tlbank-app
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_SERVLET_SESSION_TIMEOUT: ${APP_SESSION_TIMEOUT:-30m}
      APP_UPLOAD_PATH: ${APP_UPLOAD_PATH:-/app/uploads}
      LOG_PATH: /app/logs
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      TLBANK_IDEMPOTENCY_STORE: redis
    ports:
      - "8080:8080"
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs
    networks:
      - tlbank-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/actuator/health/liveness | grep -q '\"status\":\"UP\"' || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 180s
    restart: unless-stopped

volumes:
  sqlserver-data:
  app-uploads:
  app-logs:
  redis-data:

networks:
  tlbank-network:
    driver: bridge
